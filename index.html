<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Next Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .next-main {
      background: linear-gradient(90deg, #00ff88, #00cc66);
      color: #000;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 25px;
      box-shadow: 0 0 35px rgba(0, 255, 136, 0.6);
    }
    .timer {
      font-size: 48px;
      font-weight: bold;
    }
    .warning {
      background: #ff4444 !important;
      color: white !important;
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 50% { opacity: 0.7; } }

    .last-result {
      background: rgba(0,0,0,0.7);
      border: 3px solid #ffd700;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }
    .number-circle {
      width: 110px; height: 110px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: bold;
      color: white; margin: 12px auto;
    }
    .red { background: linear-gradient(45deg, #ff0000, #aa0000); }
    .green { background: linear-gradient(45deg, #00ff00, #008800); }
    .violet { background: linear-gradient(45deg, #8a2be2, #4b0082); }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning">WinGo 30S - Next Result</h1>

  <!-- ==================== NEXT RESULT (Sabse Bada) ==================== -->
  <div class="next-main" id="next-main">
    <h4>Next Period</h4>
    <h2 id="next-period" class="mb-3">Loading...</h2>
    <div class="timer" id="timer">30</div>
    <small id="timer-text">seconds remaining</small>
  </div>

  <!-- Last Result (Chhota) -->
  <div class="last-result mb-4">
    <h5 class="text-warning">Last Result</h5>
    <div id="big-number" class="number-circle red">00</div>
    <h5 id="color-name">RED</h5>
    <small id="premium">Premium : 0</small>
  </div>

  <div class="text-center mb-4">
    <small id="status" class="text-success">Connected</small>
  </div>

  <!-- History -->
  <h5 class="mb-3 text-light">Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let lastIssue = null;
let timerInterval = null;

async function fetchResults() {
  try {
    const res = await fetch(API_URL + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      const current = data.data.list[0];

      if (!lastIssue || lastIssue.issueNumber !== current.issueNumber) {
        lastIssue = current;
        showLastResult(current);
        startTimer();
      }

      showHistory(data.data.list);
      document.getElementById("status").innerHTML = "✅ Live";
    }
  } catch (e) {
    document.getElementById("status").innerHTML = "❌ Error";
  }
}

function showLastResult(item) {
  document.getElementById("big-number").textContent = item.number;
  document.getElementById("big-number").className = `number-circle ${getColorClass(item.color)}`;
  document.getElementById("color-name").textContent = item.color.toUpperCase();
  document.getElementById("premium").innerHTML = `Premium : <strong>${item.premium}</strong>`;
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);

  let timeLeft = 30;

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    if (timeLeft <= 10) {
      document.getElementById("next-main").classList.add("warning");
    } else {
      document.getElementById("next-main").classList.remove("warning");
    }

    if (timeLeft <= 0) {
      fetchResults();
    }
  }, 1000);
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";

  list.slice(1, 12).forEach(item => {
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:50px;height:50px;font-size:22px;">
          ${item.number}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Update
setInterval(fetchResults, 3000);
fetchResults();
</script>

</body>
</html>
