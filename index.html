<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WinGo Big/Small Analyst</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 10px; }
        .card { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: center; border: 1px solid #38bdf8; }
        .stat { font-size: 1.2em; font-weight: bold; margin: 5px 0; }
        .big { color: #f59e0b; } .small { color: #8b5cf6; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; color: white; }
        th, td { padding: 8px; border: 1px solid #334155; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Live Analyst (Big/Small)</h3>
        <div id="analyst-output" class="stat">Analyzing data...</div>
    </div>
    
    <table id="historyTable">
        <thead><tr><th>Issue</th><th>No.</th><th>Result</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        async function runAnalysis() {
            const url = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
            try {
                // सीधे फेच (CORS एक्सटेंशन ऑन रखें)
                const res = await fetch(url);
                const json = await res.json();
                const list = json.data.list;
                
                let big = 0, small = 0;
                list.slice(0, 10).forEach(i => {
                    const num = parseInt(i.number);
                    if(num >= 5) big++; else small++;
                });

                document.getElementById('analyst-output').innerHTML = 
                    `Big: ${big} | Small: ${small}<br>
                    Next Prediction: ${big > small ? '<span class="big">Big</span>' : '<span class="small">Small</span>'}`;
                
                document.getElementById('tbody').innerHTML = list.map(i => `
                    <tr>
                        <td>${i.issueNumber.slice(-4)}</td>
                        <td>${i.number}</td>
                        <td class="${parseInt(i.number)>=5?'big':'small'}">${parseInt(i.number)>=5?'Big':'Small'}</td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('analyst-output').innerHTML = "CORS Error! Extention On करें!";
            }
        }
        setInterval(runAnalysis, 3000);
        runAnalysis();
    </script>
</body>
</html>
