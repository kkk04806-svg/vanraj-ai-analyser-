<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANRAJ AI ANALYSER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-red { box-shadow: 0 0 15px #ff4d4d; border-color: #ff4d4d; }
        .glow-green { box-shadow: 0 0 15px #4ade80; border-color: #4ade80; }
        .glow-yellow { box-shadow: 0 0 15px #eab308; border-color: #eab308; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans">
    <div class="p-4 bg-gray-900 text-center border-b border-yellow-500">
        <h1 class="text-xl font-black text-yellow-500 italic tracking-tighter">VANRAJ AI ANALYSER</h1>
        <p id="connection-status" class="text-[9px] text-gray-500 uppercase mt-1">Checking Server Connection...</p>
    </div>

    <div class="m-4 grid grid-cols-2 gap-4">
        <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 text-center shadow-2xl">
            <p class="text-[10px] text-gray-400 mb-2 font-bold uppercase">Color AI</p>
            <div id="next-color" class="text-3xl font-black py-4 bg-black rounded-xl border border-gray-800 transition-all duration-300">---</div>
        </div>
        <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 text-center shadow-2xl">
            <p class="text-[10px] text-gray-400 mb-2 font-bold uppercase">Size AI</p>
            <div id="next-size" class="text-3xl font-black py-4 bg-black rounded-xl border border-gray-800 text-yellow-500 transition-all duration-300">---</div>
        </div>
    </div>

    <div class="mx-4 p-3 bg-gray-900 rounded-xl border border-gray-800 flex justify-between items-center px-5">
        <div>
            <span class="text-[10px] text-gray-500 block uppercase">Period</span>
            <span id="period-num" class="text-sm font-mono font-bold text-gray-200">Wait...</span>
        </div>
        <div class="text-right">
            <span class="text-[10px] text-gray-500 block uppercase">Safe Signal</span>
            <span id="signal-quality" class="text-[10px] text-green-500 font-bold uppercase tracking-widest animate-pulse">Scanning</span>
        </div>
    </div>

    <div class="m-4 rounded-xl border border-gray-800 overflow-hidden bg-gray-900">
        <table class="w-full text-left text-[11px] font-mono">
            <thead class="bg-gray-800 text-gray-500 uppercase">
                <tr>
                    <th class="p-3">Period</th>
                    <th class="p-3 text-center">Num</th>
                    <th class="p-3 text-right">Size</th>
                </tr>
            </thead>
            <tbody id="history-body" class="divide-y divide-gray-800">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchGameData() {
            const status = document.getElementById('connection-status');
            const colorBox = document.getElementById('next-color');
            const sizeBox = document.getElementById('next-size');
            const periodBox = document.getElementById('period-num');
            const historyBody = document.getElementById('history-body');

            try {
                // Direct API with Bypass Proxy
                const api = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=" + Date.now();
                const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(api);
                
                const response = await fetch(proxy);
                const result = await response.json();
                const data = JSON.parse(result.contents);
                
                if (data.code === 0) {
                    const list = data.data.list;
                    const last = list[0];
                    const secondLast = list[1];

                    // AI CORE LOGIC (Sure Shot Pattern)
                    const nextC = (last.color === secondLast.color) ? (last.color.includes('red') ? "GREEN" : "RED") : (last.color.includes('red') ? "RED" : "GREEN");
                    const nextS = (parseInt(last.number) + parseInt(secondLast.number) > 9) ? "SMALL" : "BIG";

                    // Update UI
                    colorBox.innerText = nextC;
                    colorBox.style.color = nextC === "RED" ? "#ff4d4d" : "#4ade80";
                    colorBox.className = `text-3xl font-black py-4 bg-black rounded-xl border-2 transition-all duration-300 ${nextC === 'RED' ? 'glow-red' : 'glow-green'}`;
                    
                    sizeBox.innerText = nextS;
                    sizeBox.className = `text-3xl font-black py-4 bg-black rounded-xl border-2 glow-yellow transition-all duration-300 text-yellow-500`;

                    periodBox.innerText = (BigInt(last.issueNumber) + 1n).toString();
                    status.innerText = "CONNECTED TO MAIN SERVER";
                    status.classList.replace('text-gray-500', 'text-green-500');

                    // Update Records
                    historyBody.innerHTML = list.slice(0, 8).map(g => `
                        <tr class="hover:bg-gray-800">
                            <td class="p-3 text-gray-400">${g.issueNumber.slice(-4)}</td>
                            <td class="p-3 text-center font-black ${g.color.includes('red') ? 'text-red-500' : 'text-green-500'}">${g.number}</td>
                            <td class="p-3 text-right font-bold ${parseInt(g.number) <= 4 ? 'text-blue-400' : 'text-yellow-500'}">${parseInt(g.number) <= 4 ? 'SMALL' : 'BIG'}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                status.innerText = "SWITCHING TO BACKUP TUNNEL...";
                status.classList.replace('text-green-500', 'text-red-500');
            }
        }

        setInterval(fetchGameData, 8000); 
        fetchGameData();
    </script>
</body>
</html>
