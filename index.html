<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Smart Analysis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f0f1a, #1a0033); color: #fff; font-family: 'Segoe UI', sans-serif; }
    .next-box { background: linear-gradient(90deg, #00ff88, #00cc66); color: #000; padding: 20px; border-radius: 18px; text-align: center; margin-bottom: 20px; }
    .timer { font-size: 52px; font-weight: bold; }
    .warning { animation: blink 0.8s infinite; background: #ff4444 !important; color: white !important; }
    @keyframes blink { 50% { opacity: 0.6; } }
    .number-circle { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: bold; margin: 15px auto; box-shadow: 0 0 40px rgba(255,255,255,0.6); }
    .red { background: linear-gradient(#ff0000, #aa0000); }
    .green { background: linear-gradient(#00ff00, #008800); }
    .violet { background: linear-gradient(#8a2be2, #4b0082); }
    .analysis { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning"><i class="fas fa-fire"></i> WinGo 30S Smart Predict</h1>

  <!-- Next Period + Timer -->
  <div class="next-box" id="next-box">
    <h5>Next Period</h5>
    <h3 id="next-period">Loading...</h3>
    <div class="timer" id="timer">30</div>
    <small>Seconds Remaining</small>
  </div>

  <!-- Last Result -->
  <div class="text-center mb-4">
    <h5>Last Result</h5>
    <div id="big-number" class="number-circle red">00</div>
    <h4 id="color-name">RED</h4>
    <h5 id="premium">Premium : 0</h5>
  </div>

  <!-- Smart Analysis -->
  <div class="analysis mb-4">
    <h5><i class="fas fa-chart-bar"></i> Quick Analysis</h5>
    <div id="analysis" class="row text-center"></div>
  </div>

  <!-- History -->
  <h5 class="mb-3 text-light">Recent 10 Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let lastIssue = null;
let timerInterval = null;

async function fetchResults() {
  try {
    const res = await fetch(API_URL + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      const current = data.data.list[0];

      if (!lastIssue || lastIssue.issueNumber !== current.issueNumber) {
        lastIssue = current;
        showLastResult(current);
        startTimer();
      }

      showHistory(data.data.list);
      showAnalysis(data.data.list);
    }
  } catch (e) {
    console.error(e);
  }
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function showLastResult(item) {
  document.getElementById("big-number").textContent = item.number;
  document.getElementById("big-number").className = `number-circle ${getColorClass(item.color)}`;
  document.getElementById("color-name").textContent = item.color.toUpperCase();
  document.getElementById("premium").innerHTML = `Premium : <strong>${item.premium}</strong>`;
  document.getElementById("next-period").textContent = (parseInt(item.issueNumber) + 1);
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  let time = 30;

  timerInterval = setInterval(() => {
    time--;
    document.getElementById("timer").textContent = time;

    if (time <= 10) {
      document.getElementById("next-box").classList.add("warning");
    } else {
      document.getElementById("next-box").classList.remove("warning");
    }

    if (time <= 0) fetchResults();
  }, 1000);
}

function showAnalysis(list) {
  const container = document.getElementById("analysis");
  container.innerHTML = "";

  let red = 0, green = 0, violet = 0;
  list.slice(0, 10).forEach(item => {
    if (item.color.includes("red")) red++;
    else if (item.color.includes("green")) green++;
    else if (item.color.includes("violet")) violet++;
  });

  const stats = [
    {color: "Red", count: red, class: "text-danger"},
    {color: "Green", count: green, class: "text-success"},
    {color: "Violet", count: violet, class: "text-purple"}
  ];

  stats.forEach(s => {
    const div = document.createElement("div");
    div.className = "col-4";
    div.innerHTML = `<h4 class="${s.class}">${s.count}</h4><small>${s.color}</small>`;
    container.appendChild(div);
  });
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";
  list.slice(0, 10).forEach(item => {
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:50px;height:50px;font-size:22px;">
          ${item.number}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Start
setInterval(fetchResults, 3000);
fetchResults();
</script>

</body>
</html>
