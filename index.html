<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0b0e11; color: #e9ecef; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .analyzer-card { background: #1e2329; border: 1px solid #f0b90b; border-radius: 16px; padding: 25px; width: 340px; text-align: center; }
        input { width: 90%; padding: 12px; background: #2b3139; border: 1px solid #474d57; color: #fff; border-radius: 8px; margin-bottom: 20px; }
        .btn-check { background: #f0b90b; color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .result-display { margin-top: 25px; padding: 15px; background: #2b3139; border-radius: 12px; display: none; }
        .big-text { font-size: 32px; font-weight: bold; margin: 5px 0; }
        /* Using PRE tag as defined in your source code */
        pre { font-size: 10px; color: #848e9c; text-align: left; background: #000; padding: 10px; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="analyzer-card">
        <h2 style="color: #f0b90b;">VANRAJ AI ANALYSER</h2>
        <input type="number" id="periodInput" placeholder="Enter Period Number...">
        <button class="btn-check" onclick="getAnalysis()">ANALYSE NOW</button>

        <div id="resultBox" class="result-display">
            <div style="font-size: 14px; color: #848e9c;">PREDICTION</div>
            <div id="mainRes" class="big-text">---</div>
            <div id="subRes" style="font-weight: bold;">---</div>
            <pre id="rawLogs">// Ready to analyse</pre>
        </div>
    </div>

    <script>
        async function getAnalysis() {
            const period = document.getElementById('periodInput').value;
            const resBox = document.getElementById('resultBox');
            
            if(!period) return alert("Enter Period Number First!");

            resBox.style.display = "block";
            document.getElementById('mainRes').innerText = "CALCULATING...";

            try {
                // Fetch call to your server.php
                const response = await fetch('server.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ period: period })
                });
                
                const data = await response.json();

                if(data.success) {
                    const p = data.prediction;
                    // Result First Show
                    document.getElementById('mainRes').innerText = p.size + " (" + p.number + ")";
                    document.getElementById('mainRes').style.color = (p.color === "RED") ? "#f6465d" : "#2ebd85";
                    document.getElementById('subRes').innerText = "COLOR: " + p.color + " | CONFIDENCE: " + p.accuracy;
                    document.getElementById('rawLogs').innerText = JSON.stringify(data, null, 2);
                }
            } catch (err) {
                document.getElementById('mainRes').innerText = "ERROR";
                document.getElementById('rawLogs').innerText = "Server not responding. Check connection.";
            }
        }
    </script>
</body>
</html>
