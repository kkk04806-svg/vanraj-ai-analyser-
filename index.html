<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Live Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .period {
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      color: #000;
      font-size: 28px;
      font-weight: bold;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
    }
    .main-result {
      background: rgba(0,0,0,0.85);
      border: 6px solid #ffd700;
      border-radius: 25px;
      padding: 35px 20px;
      text-align: center;
      margin-bottom: 30px;
    }
    .number-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 75px;
      font-weight: bold;
      color: white;
      margin: 20px auto;
      box-shadow: 0 0 50px rgba(255,255,255,0.8);
    }
    .red { background: linear-gradient(45deg, #ff0000, #aa0000); }
    .green { background: linear-gradient(45deg, #00ff00, #008800); }
    .violet { background: linear-gradient(45deg, #8a2be2, #4b0082); }

    .history-item {
      background: #1a1a2e;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
    }
    .last-updated {
      font-size: 14px;
      color: #00ff88;
    }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning">
    <i class="fas fa-fire"></i> WinGo 30S Live Result
  </h1>

  <!-- Period -->
  <div class="period" id="period">
    Period : <span id="period-number">Loading...</span>
  </div>

  <!-- Latest Result -->
  <div class="main-result" id="main-result">
    <h5 class="text-warning mb-3">LATEST RESULT</h5>
    <div id="big-number" class="number-circle red">00</div>
    <h2 id="color-name" class="text-uppercase fw-bold mb-2">RED</h2>
    <h5 id="premium" class="text-warning fs-4">Premium : 0</h5>
  </div>

  <div class="text-center mb-3">
    <span class="last-updated" id="last-updated">Last Updated: Just Now</span>
  </div>

  <!-- History -->
  <h5 class="mb-3 text-light"><i class="fas fa-history"></i> Previous Results</h5>
  <div id="history" class="row row-cols-2 row-cols-sm-3 row-cols-md-5 g-3"></div>

</div>

<script>
// API
const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let allResults = [];

async function fetchResults() {
  try {
    const response = await fetch(API_URL + "?ts=" + Date.now(), {
      cache: 'no-cache'
    });
    
    if (!response.ok) throw new Error("Network error");

    const data = await response.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      allResults = data.data.list;
      showLatestResult();
      showHistory();
      updateTimestamp();
    }
  } catch (error) {
    console.error("API Error:", error);
    document.getElementById("period-number").textContent = "Connection Error";
  }
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function showLatestResult() {
  const latest = allResults[0];

  document.getElementById("period-number").textContent = latest.issueNumber;

  const bigNum = document.getElementById("big-number");
  bigNum.textContent = latest.number;
  bigNum.className = `number-circle ${getColorClass(latest.color)}`;

  document.getElementById("color-name").textContent = latest.color.toUpperCase();
  document.getElementById("premium").innerHTML = `Premium : <strong>${latest.premium}</strong>`;
}

function showHistory() {
  const container = document.getElementById("history");
  container.innerHTML = "";

  allResults.slice(1, 15).forEach(item => {
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="history-item">
        <small class="text-white-50">${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:52px;height:52px;font-size:24px;">
          ${item.number}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

function updateTimestamp() {
  document.getElementById("last-updated").textContent = 
    "Last Updated: " + new Date().toLocaleTimeString('en-IN');
}

// Auto Refresh - Every 3.5 seconds (Best for WinGo 30S)
setInterval(fetchResults, 3500);

// Initial Load
fetchResults();
</script>

</body>
</html>
