<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Current Period</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .current-period {
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      color: #000;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
    }
    .timer {
      font-size: 55px;
      font-weight: bold;
    }
    .warning { animation: blink 0.8s infinite; }
    @keyframes blink { 50% { opacity: 0.6; } }

    .result-box {
      background: rgba(0,0,0,0.8);
      border: 4px solid #ffd700;
      border-radius: 16px;
      padding: 25px;
      text-align: center;
    }
    .number-circle {
      width: 130px; height: 130px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 60px; font-weight: bold;
      color: white;
      margin: 15px auto;
      box-shadow: 0 0 40px rgba(255,255,255,0.7);
    }
    .red { background: linear-gradient(#ff0000, #cc0000); }
    .green { background: linear-gradient(#00ff00, #00aa00); }
    .violet { background: linear-gradient(#aa44ff, #6600cc); }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning">🔥 WinGo 30S - Current Period</h1>

  <!-- Current Running Period -->
  <div class="current-period" id="current-box">
    <h5>Current Period</h5>
    <h3 id="current-period" class="mb-3">Loading...</h3>
    <div class="timer" id="timer">30</div>
    <small>seconds remaining</small>
  </div>

  <!-- Result of Current Period -->
  <div class="result-box mb-4" id="result-box">
    <h5 class="text-warning">Current Period Result</h5>
    <div id="current-result" class="d-flex justify-content-center align-items-center gap-4"></div>
  </div>

  <div class="text-center mb-4">
    <small id="status" class="text-success">Connected</small>
  </div>

  <!-- Recent History -->
  <h5 class="mb-3 text-light">Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let currentRunningPeriod = null;

async function fetchResults() {
  try {
    const res = await fetch(API_URL + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      const latest = data.data.list[0];

      // Show Current Running Period
      showCurrentPeriod(latest.issueNumber);

      // Show Result of Latest Period
      showCurrentResult(latest);

      showHistory(data.data.list);
      document.getElementById("status").innerHTML = "✅ Live Connected";
    }
  } catch (e) {
    document.getElementById("status").innerHTML = "❌ Error";
  }
}

function showCurrentPeriod(issueNumber) {
  document.getElementById("current-period").textContent = issueNumber;
}

function showCurrentResult(item) {
  document.getElementById("current-result").innerHTML = `
    <div class="number-circle ${getColorClass(item.color)}">${item.number}</div>
    <div>
      <h4 class="mb-0">${item.color.toUpperCase()}</h4>
      <small>Premium: ${item.premium}</small>
    </div>
  `;
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";
  list.slice(1, 12).forEach(item => {
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:52px;height:52px;font-size:24px;">
          ${item.number}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Refresh every 3 seconds
setInterval(fetchResults, 3000);
fetchResults();
</script>

</body>
</html>
