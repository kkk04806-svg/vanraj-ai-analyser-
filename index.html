<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANRAJ AI ANALYSER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="p-4 bg-gray-900 text-center border-b border-yellow-500 shadow-lg">
        <h1 class="text-xl font-bold text-yellow-500 uppercase tracking-widest">VANRAJ AI ANALYSER</h1>
    </div>

    <div class="m-4 p-6 bg-gray-900 rounded-2xl border border-gray-800 text-center shadow-2xl">
        <p id="status-text" class="text-gray-500 text-xs mb-2 italic">AI READY FOR PREDICTION</p>
        <div id="prediction-box" class="text-5xl font-black py-8 rounded-xl bg-gray-800 shadow-inner tracking-tighter">
            READY
        </div>
        
        <div class="mt-6">
            <p class="text-[10px] text-yellow-500 mb-2 font-bold uppercase">Enter Last Number Below:</p>
            <div class="flex justify-center gap-2">
                <input type="number" id="manual-num" placeholder="0-9" class="w-20 p-3 bg-black border border-gray-700 rounded-lg text-center text-xl font-bold text-yellow-500 focus:border-yellow-500 outline-none">
                <button onclick="calculateManual()" class="px-6 py-3 bg-yellow-600 text-white font-black rounded-lg active:scale-95 transition shadow-lg uppercase text-xs">Analyze</button>
            </div>
        </div>
    </div>

    <div class="mx-4 p-4 bg-gray-900 rounded-xl border border-gray-800">
        <h3 class="text-xs font-bold text-gray-500 uppercase mb-3">AI Trend Guide</h3>
        <div class="grid grid-cols-2 gap-2 text-[10px]">
            <div class="p-2 bg-gray-800 rounded">0, 2, 4, 6, 8 = <span class="text-red-500 font-bold">RED</span></div>
            <div class="p-2 bg-gray-800 rounded">1, 3, 5, 7, 9 = <span class="text-green-500 font-bold">GREEN</span></div>
        </div>
    </div>

    <script>
        function calculateManual() {
            const num = document.getElementById('manual-num').value;
            const pBox = document.getElementById('prediction-box');
            const status = document.getElementById('status-text');
            
            if (num === "") return alert("Please enter a number!");
            
            // Vanraj AI Logic
            const n = parseInt(num);
            const nextPrediction = n <= 4 ? "BIG" : "SMALL";
            const nextColor = (n % 2 === 0) ? "GREEN" : "RED"; // Anti-trend logic
            
            pBox.innerText = nextColor;
            pBox.style.color = nextColor === 'RED' ? '#ff4d4d' : '#4ade80';
            status.innerText = "● PREDICTION CALCULATED";
            document.getElementById('manual-num').value = "";
        }
    </script>
</body>
</html>
