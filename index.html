<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WinGo 30S - 1 Number + Analyst</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 20px;
      background: #f8f8f8;
    }
    .container {
      max-width: 800px;
      margin: auto;
    }
    .results {
      margin-top: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #eee;
    }
    .reds { color: maroon; font-weight: bold; }
    .greens { color: green; font-weight: bold; }
    .violet { color: #8a2be2; }
    .analysis {
      margin-top: 20px;
      padding: 10px 15px;
      background: #f0f8ff;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .status {
      margin-bottom: 10px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>WinGo 30S - Last 10 Numbers (1 Number)</h2>
    <div class="status">Fetching data...</div>

    <div class="results">
      <table>
        <thead>
          <tr>
            <th>Issue</th>
            <th>Number</th>
            <th>Color</th>
            <th>Premium</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>

    <div class="analysis">
      <h3>Simple 1 Number Analyst</h3>
      <div id="stats">
        Red: <span class="reds" id="redCount">0</span> |
        Green: <span class="greens" id="greenCount">0</span> |
        Violet: <span class="violet" id="violetCount">0</span>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

    function renderList(items) {
      const tbody = document.getElementById("list");
      tbody.innerHTML = "";

      items.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.issueNumber}</td>
          <td>${item.number}</td>
          <td class="${item.color.includes('red') ? 'reds' : item.color.includes('green') ? 'greens' : item.color.includes('violet') ? 'violet' : ''}">
            ${item.color}
          </td>
          <td>${item.premium}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function analyzeColors(items) {
      let red = 0, green = 0, violet = 0;

      items.forEach(item => {
        if (item.color.includes("red")) red++;
        if (item.color.includes("green")) green++;
        if (item.color.includes("violet")) violet++;
      });

      document.getElementById("redCount").textContent = red;
      document.getElementById("greenCount").textContent = green;
      document.getElementById("violetCount").textContent = violet;
    }

    async function load() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (!data.data || !data.data.list) {
          document.querySelector(".status").textContent = "Invalid response";
          return;
        }

        const list = data.data.list;

        renderList(list);
        analyzeColors(list);
        document.querySelector(".status").textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        document.querySelector(".status").textContent = "Error: " + err.message;
        console.error(err);
      }
    }

    // First load
    load();

    // Auto refresh every 5 seconds
    setInterval(load, 5000);
  </script>
</body>
</html>
