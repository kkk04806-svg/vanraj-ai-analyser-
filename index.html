<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Next Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f0f1a, #1a0033); color: #fff; min-height: 100vh; }
    .next-box { background: linear-gradient(90deg, #00ff88, #00aa66); color: #000; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
    .timer { font-size: 45px; font-weight: bold; }
    .warning { background: #ff4444 !important; color: white !important; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.7; } }
    .number-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; margin: 8px; }
    .red { background: #ff0000; }
    .green { background: #00cc00; }
    .hot { background: #ffd700; color: black; }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning">WinGo 30S - Next Prediction</h1>

  <!-- Next Period -->
  <div class="next-box" id="next-box">
    <h4>Next Period</h4>
    <h2 id="next-period">Loading...</h2>
    <div class="timer" id="timer">30</div>
  </div>

  <!-- Last Result -->
  <div class="text-center mb-4">
    <h5>Last Result</h5>
    <div id="last-result" class="d-flex justify-content-center align-items-center gap-3"></div>
  </div>

  <!-- Prediction -->
  <div class="card bg-dark mb-4">
    <div class="card-body">
      <h5 class="text-info">Suggested Next Number (Based on Trend)</h5>
      <div id="prediction" class="text-center"></div>
    </div>
  </div>

  <!-- Hot / Cold Numbers -->
  <h5 class="mb-3">Hot & Cold Numbers (Missing Count)</h5>
  <div id="trend" class="row g-2"></div>

  <!-- History -->
  <h5 class="mt-4 mb-3">Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
// API 1: History
const HISTORY_API = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
// API 2: Trend Statistics
const TREND_API = "https://api.ar-lottery01.com/api/Lottery/GetTrendStatistics?gameCode=WinGo_30S&pageNo=1&pageSize=10&language=en";

let lastIssue = null;

async function fetchAll() {
  try {
    const [histRes, trendRes] = await Promise.all([
      fetch(HISTORY_API + "?ts=" + Date.now()),
      fetch(TREND_API)
    ]);

    const histData = await histRes.json();
    const trendData = await trendRes.json();

    if (histData.code === 0 && histData.data?.list?.length > 0) {
      const current = histData.data.list[0];
      if (!lastIssue || lastIssue.issueNumber !== current.issueNumber) {
        lastIssue = current;
        showLastResult(current);
        startTimer();
      }
      showHistory(histData.data.list);
    }

    if (trendData.code === 0 && trendData.data) {
      showTrend(trendData.data);
      showPrediction(trendData.data);
    }

  } catch (e) {
    console.error(e);
  }
}

function showLastResult(item) {
  const container = document.getElementById("last-result");
  container.innerHTML = `
    <div class="number-circle ${getColorClass(item.color)}">${item.number}</div>
    <div>
      <h5>${item.color.toUpperCase()}</h5>
      <small>Premium: ${item.premium}</small>
    </div>
  `;
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function showTrend(data) {
  const container = document.getElementById("trend");
  container.innerHTML = "";

  data.forEach(item => {
    const isHot = item.missingCount <= 5;
    const div = document.createElement("div");
    div.className = "col-3 col-md-2 text-center";
    div.innerHTML = `
      <div class="number-circle ${isHot ? 'hot' : 'red'}" style="font-size:24px">${item.number}</div>
      <small>Missing: <b>${item.missingCount}</b></small>
    `;
    container.appendChild(div);
  });
}

function showPrediction(data) {
  // Sabse zyada missing wala (Cold) aur sabse kam missing wala (Hot)
  const sorted = [...data].sort((a,b) => b.missingCount - a.missingCount);
  const coldest = sorted[0];
  const hottest = data.find(n => n.missingCount === Math.min(...data.map(d=>d.missingCount)));

  document.getElementById("prediction").innerHTML = `
    <div class="row text-center">
      <div class="col-6">
        <strong>Hot Number</strong><br>
        <div class="number-circle hot mx-auto">${hottest.number}</div>
      </div>
      <div class="col-6">
        <strong>Cold Number (Due)</strong><br>
        <div class="number-circle red mx-auto">${coldest.number}</div>
      </div>
    </div>
    <small class="text-warning">Suggestion: Try <b>${coldest.missingCount > 15 ? coldest.number : hottest.number}</b> this round</small>
  `;
}

function startTimer() {
  let time = 30;
  const timerEl = document.getElementById("timer");
  const box = document.getElementById("next-box");

  const int = setInterval(() => {
    time--;
    timerEl.textContent = time;

    if (time <= 10) box.classList.add("warning");
    else box.classList.remove("warning");

    if (time <= 0) {
      clearInterval(int);
      fetchAll();
    }
  }, 1000);
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";
  list.slice(1, 10).forEach(item => {
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:50px;height:50px;font-size:22px;">
          ${item.number}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Refresh
setInterval(fetchAll, 4000);
fetchAll();
</script>

</body>
</html>
