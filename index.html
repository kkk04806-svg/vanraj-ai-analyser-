<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Next Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .next-period {
      background: linear-gradient(90deg, #00ff88, #00cc66);
      color: #000;
      font-size: 26px;
      font-weight: bold;
      padding: 18px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
    }
    .main-result {
      background: rgba(0,0,0,0.85);
      border: 5px solid #ffd700;
      border-radius: 25px;
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 25px;
    }
    .number-circle {
      width: 155px;
      height: 155px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      font-weight: bold;
      color: white;
      margin: 20px auto;
      box-shadow: 0 0 45px rgba(255,255,255,0.8);
    }
    .red { background: linear-gradient(45deg, #ff0000, #aa0000); }
    .green { background: linear-gradient(45deg, #00ff00, #008800); }
    .violet { background: linear-gradient(45deg, #8a2be2, #4b0082); }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning">
    <i class="fas fa-clock"></i> WinGo 30S - Next Period
  </h1>

  <!-- Next Period -->
  <div class="next-period" id="next-period">
    Next Period : <span id="next-issue">Loading...</span>
  </div>

  <!-- Latest Result (Aage ke liye reference) -->
  <div class="main-result">
    <h5 class="text-warning mb-3">Latest Result</h5>
    <div id="big-number" class="number-circle red">00</div>
    <h2 id="color-name" class="text-uppercase fw-bold">RED</h2>
    <h5 id="premium" class="text-warning">Premium : 0</h5>
  </div>

  <div class="text-center mb-4">
    <small class="text-success" id="last-updated">Connecting to Server...</small>
  </div>

  <!-- History -->
  <h5 class="mb-3 text-light"><i class="fas fa-history"></i> Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
// API Connect
const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let results = [];

async function fetchResults() {
  try {
    const res = await fetch(API_URL + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      results = data.data.list;

      // Show Latest Result
      showLatestResult();

      // Next Period Calculation (Current + 1)
      showNextPeriod();

      showHistory();
      document.getElementById("last-updated").innerHTML = `✅ Server Connected • ${new Date().toLocaleTimeString()}`;
    }
  } catch (e) {
    document.getElementById("last-updated").innerHTML = `❌ Connection Failed`;
    console.error(e);
  }
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function showLatestResult() {
  const latest = results[0];
  document.getElementById("big-number").textContent = latest.number;
  document.getElementById("big-number").className = `number-circle ${getColorClass(latest.color)}`;
  document.getElementById("color-name").textContent = latest.color.toUpperCase();
  document.getElementById("premium").innerHTML = `Premium : <strong>${latest.premium}</strong>`;
}

function showNextPeriod() {
  const latest = results[0];
  const latestNum = parseInt(latest.issueNumber);
  const nextNum = latestNum + 1;
  document.getElementById("next-issue").textContent = nextNum;
}

function showHistory() {
  const container = document.getElementById("history");
  container.innerHTML = "";

  results.slice(1, 11).forEach(item => {
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:50px;height:50px;font-size:22px;">
          ${item.number}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Refresh
setInterval(fetchResults, 3000);
fetchResults();
</script>

</body>
</html>
