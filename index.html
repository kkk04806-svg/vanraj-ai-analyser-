<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Big Small Analysis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f0f1a, #1a0033); color: #fff; font-family: 'Segoe UI', sans-serif; }
    .next-box { background: linear-gradient(90deg, #00ff88, #00cc66); color: #000; padding: 20px; border-radius: 18px; text-align: center; margin-bottom: 20px; font-weight: bold; }
    .timer { font-size: 50px; font-weight: bold; }
    .warning { background: #ff0000 !important; color: white !important; animation: blink 0.8s infinite; }
    @keyframes blink { 50% { opacity: 0.7; } }
    .number-circle { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: bold; margin: 15px auto; box-shadow: 0 0 40px rgba(255,255,255,0.7); }
    .red { background: linear-gradient(#ff0000, #aa0000); }
    .green { background: linear-gradient(#00ff00, #008800); }
    .violet { background: linear-gradient(#8a2be2, #4b0082); }
    .prediction { font-size: 22px; font-weight: bold; }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning">WinGo 30S - Big/Small Smart Analysis</h1>

  <!-- Next Period -->
  <div class="next-box" id="next-box">
    <h5>Next Period</h5>
    <h3 id="next-period">Loading...</h3>
    <div class="timer" id="timer">30</div>
    <small>Seconds Left</small>
  </div>

  <!-- Last Result -->
  <div class="text-center mb-4">
    <h5>Last Result</h5>
    <div id="big-number" class="number-circle red">00</div>
    <h4 id="color-name">RED</h4>
    <h5 id="premium">Premium : 0</h5>
  </div>

  <!-- Big Small Prediction -->
  <div class="text-center mb-4 p-4 bg-dark rounded">
    <h5>Big / Small Prediction</h5>
    <div id="prediction" class="prediction text-success">Loading Analysis...</div>
    <small id="confidence" class="text-warning">Confidence: --%</small>
  </div>

  <!-- Recent Trend -->
  <div class="mb-4">
    <h5>Recent Trend (Last 10)</h5>
    <div id="trend" class="d-flex justify-content-center gap-2 flex-wrap"></div>
  </div>

  <!-- History -->
  <h5 class="mb-3">Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let lastIssue = null;

async function fetchResults() {
  try {
    const res = await fetch(API_URL + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      const current = data.data.list[0];

      if (!lastIssue || lastIssue.issueNumber !== current.issueNumber) {
        lastIssue = current;
        showLastResult(current);
        startTimer();
      }

      showHistory(data.data.list);
      analyzeBigSmall(data.data.list);
    }
  } catch (e) { console.error(e); }
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function showLastResult(item) {
  document.getElementById("big-number").textContent = item.number;
  document.getElementById("big-number").className = `number-circle ${getColorClass(item.color)}`;
  document.getElementById("color-name").textContent = item.color.toUpperCase();
  document.getElementById("premium").innerHTML = `Premium : <strong>${item.premium}</strong>`;
  document.getElementById("next-period").textContent = (parseInt(item.issueNumber) + 1);
}

function startTimer() {
  let time = 30;
  const timerEl = document.getElementById("timer");
  const nextBox = document.getElementById("next-box");

  const int = setInterval(() => {
    time--;
    timerEl.textContent = time;

    if (time <= 10) nextBox.classList.add("warning");
    else nextBox.classList.remove("warning");

    if (time <= 0) {
      clearInterval(int);
      fetchResults();
    }
  }, 1000);
}

function analyzeBigSmall(list) {
  const recent = list.slice(0, 15);
  let big = 0, small = 0;

  recent.forEach(item => {
    const num = parseInt(item.number);
    if (num >= 5) big++;
    else small++;
  });

  const total = big + small;
  const bigPercent = Math.round((big / total) * 100);
  const smallPercent = Math.round((small / total) * 100);

  let prediction = "";
  let confidence = 65;

  if (bigPercent > smallPercent + 15) {
    prediction = "🔥 BIG Recommended";
    confidence = 82;
  } else if (smallPercent > bigPercent + 15) {
    prediction = "🔥 SMALL Recommended";
    confidence = 78;
  } else if (bigPercent > 55) {
    prediction = "Slightly BIG";
    confidence = 70;
  } else {
    prediction = "Slightly SMALL";
    confidence = 68;
  }

  document.getElementById("prediction").innerHTML = prediction;
  document.getElementById("confidence").textContent = `Confidence: ${confidence}%`;
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";

  list.slice(0, 10).forEach(item => {
    const num = parseInt(item.number);
    const bs = num >= 5 ? "Big" : "Small";
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:50px;height:50px;font-size:22px;">
          ${item.number}
        </div>
        <small class="${num>=5?'text-danger':'text-info'}">${bs}</small>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Refresh
setInterval(fetchResults, 3000);
fetchResults();
</script>

</body>
</html>
