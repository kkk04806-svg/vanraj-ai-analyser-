<!DOCTYPE html>
<html lang="en">
<head>

    <title>VANRAJ AI - WinGo 30S</title>

        .app-container { width: 100%; max-width: 400px; background: #111; border: 2px solid #ff0055; border-radius: 25px; padding: 20px; box-shadow: 0 0 20px #ff005544; }
        .title { text-align: center; color: #ff0055; font-size: 24px; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }
        
        .card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; text-align: center; }
        .label { color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 22px; font-weight: bold; color: #ffcc00; }

        .signal-text { font-size: 50px; font-weight: 900; margin: 10px 0; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .sub-signal { font-size: 18px; color: #00ff88; font-weight: bold; }
        
        .timer-box { color: #ff4444; font-size: 28px; }
        .status-dot { width: 10px; height: 10px; background: #00ff88; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        .btn-refresh { width: 100%; background: #ff0055; border: none; padding: 15px; color: #fff; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .btn-refresh:active { transform: scale(0.98); background: #cc0044; }
        
        #error-msg { color: #ff4444; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="title">Vanraj AI Analyser</div>

    <div class="card">
        <div class="label">Current Issue Number</div>
        <div id="issue" class="value">----------</div>
    </div>

    <div class="card prediction-box">
        <div class="label">Next Prediction</div>

        <div id="size" class="sub-signal">WAITING...</div>
    </div>

    <div class="card">

        <div id="timer" class="timer-box">00:00</div>
    </div>

    <button class="btn-refresh" onclick="getSignal()">Get Live Signal</button>
    
    <div style="text-align: center; margin-top: 15px;">
        <span class="status-dot"></span>
        <span style="font-size: 12px; color: #00ff88;">Server: Connected</span>
    </div>
    <div id="error-msg">Proxy Error: Retrying connection...</div>
</div>

    async function getSignal() {

        const sizeDiv = document.getElementById("size");

                const num = parseInt(last.number);

</body>
</html>
