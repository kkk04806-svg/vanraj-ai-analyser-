<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>999 Club WinGo API Connect</title>
</head>
<body>
  <h1>999 Club WinGo API Connect</h1>
  <button onclick="loadData()">Load History</button>
  <pre id="output"></pre>

  <script>
    async function loadData() {
      const url = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=' + Date.now();
      const res = await fetch(url);
      const data = await res.json();
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
