<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WinGo 30S Live - ar-lottery01</title>
  <style>
    body { font-family: system-ui; text-align: center; padding: 20px; }
    .box { margin: 10px auto; width: 300px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; }
    .issue { font-size: 18px; font-weight: bold; }
    .time { font-size: 14px; color: #555; }
    .status { color: #d00; font-weight: bold; }
  </style>
</head>
<body>
  <h2>WinGo 30S - Current Issue</h2>

  <div class="box">
    <div>Previous: <span id="prevIssue" class="issue"></span></div>
    <div class="time">From: <span id="prevStart"></span></div>
    <div class="time">To: <span id="prevEnd"></span></div>
  </div>

  <div class="box" style="background: #eef;">
    <div>Current: <span id="currIssue" class="issue"></span></div>
    <div>Status: <span id="status" class="status">Loading...</span></div>
    <div class="time">From: <span id="currStart"></span></div>
    <div class="time">To: <span id="currEnd"></span></div>
  </div>

  <div class="box">
    <div>Next: <span id="nextIssue" class="issue"></span></div>
    <div class="time">From: <span id="nextStart"></span></div>
    <div class="time">To: <span id="nextEnd"></span></div>
  </div>

  <script>
    const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetCurrentIssue.json";

    function formatDate(ts) {
      if (!ts) return "--";
      const d = new Date(ts);
      return `${d.toLocaleTimeString()} (IST)`;
    }

    function updateUI(data) {
      const { previous, current, next } = data;

      document.getElementById("prevIssue").textContent = previous?.issueNumber || "-";
      document.getElementById("prevStart").textContent = formatDate(previous?.startTime);
      document.getElementById("prevEnd").textContent = formatDate(previous?.endTime);

      document.getElementById("currIssue").textContent = current?.issueNumber || "-";
      document.getElementById("currStart").textContent = formatDate(current?.startTime);
      document.getElementById("currEnd").textContent = formatDate(current?.endTime);

      document.getElementById("nextIssue").textContent = next?.issueNumber || "-";
      document.getElementById("nextStart").textContent = formatDate(next?.startTime);
      document.getElementById("nextEnd").textContent = formatDate(next?.endTime);

      const now = Date.now();
      if (current?.startTime && current?.endTime) {
        if (now < current.startTime) document.getElementById("status").textContent = "Before start";
        else if (now >= current.startTime && now <= current.endTime) document.getElementById("status").textContent = "Active / Running";
        else document.getElementById("status").textContent = "Done / Closed";
      } else {
        document.getElementById("status").textContent = "No data";
      }
    }

    async function load() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        updateUI(data);
      } catch (err) {
        document.getElementById("status").textContent = "Error: " + err.message;
        console.error(err);
      }
    }

    load();
    setInterval(load, 5000); // har 5 sec pe refresh
  </script>
</body>
</html>
