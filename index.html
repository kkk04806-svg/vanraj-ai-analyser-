<script>
    const PROXY = "https://api.allorigins.win/get?url=";
    const API_RAW = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=";

    async function getSignal() {
        const signalDiv = document.getElementById("signal");
        const statusDiv = document.getElementById("status");
        const issueDiv = document.getElementById("issue");
        
        statusDiv.innerText = "ANALYZING...";
        statusDiv.style.color = "#ffcc00";

        try {
            // Step 1: Fetch through Proxy
            const response = await fetch(PROXY + encodeURIComponent(API_RAW + Date.now()));
            if (!response.ok) throw new Error("Network issue");
            
            const wrapper = await response.json();
            
            // Step 2: Parse the actual game data
            const gameData = JSON.parse(wrapper.contents);

            if (gameData && gameData.code === 0 && gameData.data.list.length > 0) {
                const lastResult = gameData.data.list[0];
                
                // Step 3: Update UI with Real Data
                issueDiv.innerText = lastResult.issueNumber;
                
                // Prediction Logic based on the last number
                const num = parseInt(lastResult.number);
                const nextCol = (num % 2 === 0) ? "RED" : "GREEN"; // Standard logic
                const nextSize = (num >= 5) ? "SMALL" : "BIG"; // Counter trend logic

                signalDiv.innerText = nextCol;
                signalDiv.style.color = (nextCol === "RED") ? "#ff4444" : "#00ff88";
                statusDiv.innerText = nextSize + " (CONFIRMED)";
                statusDiv.style.color = "#00ff88";
            } else {
                throw new Error("Invalid API Response");
            }
        } catch (err) {
            console.error(err);
            statusDiv.innerText = "RETRYING...";
            statusDiv.style.color = "#ff4444";
            // Auto-retry after 2 seconds if failed
            setTimeout(getSignal, 2000);
        }
    }

    // Timer Sync (30 Seconds Loop)
    setInterval(() => {
        const now = new Date();
        const sec = now.getSeconds();
        const remaining = 30 - (sec % 30);
        
        document.getElementById("timer").innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
        
        // Fetch new data exactly at the start of a new round
        if (remaining === 30) {
            getSignal();
        }
    }, 1000);

    window.onload = getSignal;
</script>
