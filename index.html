<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WinGo Live Admin</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 10px; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; border: 2px solid #38bdf8; }
        .big-val { font-size: 2.2em; font-weight: bold; color: #fbbf24; }
        .label { font-size: 0.8em; color: #94a3b8; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; color: white; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">LIVE RESULT</div>
        <div id="res-val" class="big-val">Connecting...</div>
        <div id="period-val" class="label">--</div>
    </div>
    
    <table id="historyTable">
        <thead><tr><th>Period</th><th>Num</th><th>Color</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        async function getData() {
            const target = 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json';
            const proxy = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(target);
            
            try {
                const res = await fetch(proxy);
                const data = await res.json();
                const list = data.data.list.sort((a,b) => b.issueNumber - a.issueNumber);
                const current = list[0];

                // सबसे पहले रिजल्ट अपडेट करें
                document.getElementById('res-val').innerText = current.number + ' (' + (current.number >= 5 ? 'Big' : 'Small') + ')';
                document.getElementById('period-val').innerText = 'Issue: ' + current.issueNumber;
                
                // हिस्ट्री टेबल
                document.getElementById('tbody').innerHTML = list.slice(0, 8).map(i => `
                    <tr><td>${i.issueNumber.slice(-4)}</td><td>${i.number}</td><td>${i.color}</td></tr>
                `).join('');
            } catch (e) {
                document.getElementById('res-val').innerText = "Error!";
            }
        }
        setInterval(getData, 2000);
        getData();
    </script>
</body>
</html>
