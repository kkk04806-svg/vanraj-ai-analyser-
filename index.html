<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Sure Shot Big/Small</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f0f1a, #1a0033); color: #fff; font-family: 'Segoe UI', sans-serif; }
    .next-box { background: linear-gradient(90deg, #00ff88, #00cc66); color: #000; padding: 20px; border-radius: 18px; text-align: center; margin-bottom: 20px; }
    .timer { font-size: 52px; font-weight: bold; }
    .warning { background: #ff0000 !important; color: white !important; animation: blink 0.8s infinite; }
    @keyframes blink { 50% { opacity: 0.6; } }
    .number-circle { width: 135px; height: 135px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 62px; font-weight: bold; margin: 15px auto; box-shadow: 0 0 40px rgba(255,255,255,0.7); }
    .red { background: linear-gradient(#ff0000, #aa0000); }
    .green { background: linear-gradient(#00ff00, #008800); }
    .violet { background: linear-gradient(#8a2be2, #4b0082); }
    .sure { font-size: 26px; font-weight: bold; padding: 15px; border-radius: 12px; }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning"><i class="fas fa-fire"></i> WinGo 30S Sure Shot</h1>

  <!-- Next Period -->
  <div class="next-box" id="next-box">
    <h5>NEXT PERIOD</h5>
    <h3 id="next-period">Loading...</h3>
    <div class="timer" id="timer">30</div>
    <small>Seconds Remaining</small>
  </div>

  <!-- Last Result -->
  <div class="text-center mb-4">
    <h5>Last Result</h5>
    <div id="big-number" class="number-circle red">00</div>
    <h4 id="color-name">RED</h4>
    <h5 id="premium">Premium : 0</h5>
  </div>

  <!-- Sure Shot Prediction -->
  <div class="sure bg-success text-center mb-4" id="sure-shot">
    Waiting for Analysis...
  </div>

  <!-- Big/Small Stats -->
  <div class="row text-center mb-4">
    <div class="col-6">
      <div class="p-3 bg-dark rounded">
        <h4 id="big-count" class="text-warning">0</h4>
        <small>BIG (5-9)</small>
      </div>
    </div>
    <div class="col-6">
      <div class="p-3 bg-dark rounded">
        <h4 id="small-count" class="text-info">0</h4>
        <small>SMALL (0-4)</small>
      </div>
    </div>
  </div>

  <!-- History -->
  <h5 class="mb-3">Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
// Game API
const GAME_API = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
// Backend API (aapka server.js)
const BACKEND_API = "http://localhost:3000/api/predict";

let lastIssue = null;

async function fetchGameData() {
  try {
    const res = await fetch(GAME_API + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      const current = data.data.list[0];

      if (!lastIssue || lastIssue.issueNumber !== current.issueNumber) {
        lastIssue = current;
        showLastResult(current);
        startTimer();
      }

      showHistory(data.data.list);
      analyzeAndPredict(data.data.list);
    }
  } catch (e) {
    console.error("Game API Error", e);
  }
}

function showLastResult(item) {
  document.getElementById("big-number").textContent = item.number;
  document.getElementById("big-number").className = `number-circle ${getColorClass(item.color)}`;
  document.getElementById("color-name").textContent = item.color.toUpperCase();
  document.getElementById("premium").innerHTML = `Premium : <strong>${item.premium}</strong>`;
  document.getElementById("next-period").textContent = (parseInt(item.issueNumber) + 1);
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function startTimer() {
  let time = 30;
  const timerEl = document.getElementById("timer");
  const box = document.getElementById("next-box");

  const int = setInterval(() => {
    time--;
    timerEl.textContent = time;
    if (time <= 10) box.classList.add("warning");
    else box.classList.remove("warning");
    if (time <= 0) {
      clearInterval(int);
      fetchGameData();
    }
  }, 1000);
}

async function analyzeAndPredict(list) {
  const recent = list.slice(0, 20);
  let big = 0, small = 0;

  recent.forEach(item => {
    const num = parseInt(item.number);
    if (num >= 5) big++;
    else small++;
  });

  const bigPer = Math.round((big / recent.length) * 100);

  document.getElementById("big-count").textContent = big;
  document.getElementById("small-count").textContent = small;

  // Send to your backend
  try {
    const response = await fetch(BACKEND_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        input: { big, small, bigPer, recentNumbers: recent.map(r => r.number) }
      })
    });

    const backendData = await response.json();

    let predictionText = bigPer >= 60 ? 
      `🔥 BIG Strong (${bigPer}%)` : 
      `🔥 SMALL Strong (${100 - bigPer}%)`;

    document.getElementById("sure-shot").innerHTML = `
      ${predictionText}<br>
      <small>Backend Prediction: ${backendData.prediction || 'Processing...'}</small>
    `;
    document.getElementById("sure-shot").className = `sure bg-${bigPer >= 60 ? 'warning' : 'info'} text-center mb-4`;
  } catch (e) {
    console.log("Backend not running, using local analysis");
  }
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";
  list.slice(0, 10).forEach(item => {
    const num = parseInt(item.number);
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:50px;height:50px;font-size:22px;">
          ${item.number}
        </div>
        <small>${num >= 5 ? 'BIG' : 'SMALL'}</small>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Refresh
setInterval(fetchGameData, 3000);
fetchGameData();
</script>

</body>
</html>
