<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Live Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f0f1a, #1a0033); color: #fff; font-family: 'Segoe UI', sans-serif; }
    .current-period { background: #ffd700; color: #000; padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 15px; }
    .timer-box { background: #ff0000; color: white; padding: 20px; border-radius: 15px; text-align: center; font-size: 48px; font-weight: bold; margin-bottom: 20px; }
    .warning { animation: blink 0.8s infinite; }
    @keyframes blink { 50% { opacity: 0.6; } }
    .number-circle { width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 65px; font-weight: bold; margin: 15px auto; box-shadow: 0 0 40px rgba(255,255,255,0.7); }
    .red { background: linear-gradient(#ff0000, #aa0000); }
    .green { background: linear-gradient(#00ff00, #008800); }
    .violet { background: linear-gradient(#8a2be2, #4b0082); }
    .prediction-box { font-size: 24px; font-weight: bold; padding: 18px; border-radius: 15px; }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning"><i class="fas fa-fire"></i> WinGo 30S Live Predict</h1>

  <!-- Current Running Period -->
  <div class="current-period" id="current-period">
    Current Period: <span id="current-issue">Loading...</span>
  </div>

  <!-- Timer -->
  <div class="timer-box" id="timer-box">
    <span id="timer">30</span>s
  </div>

  <!-- Last Result -->
  <div class="text-center mb-4">
    <h5>Last Result</h5>
    <div id="last-number" class="number-circle red">00</div>
    <h4 id="last-color">RED</h4>
  </div>

  <!-- Next Prediction -->
  <div class="prediction-box bg-success text-center mb-4" id="prediction-box">
    Analysing Next Result...
  </div>

  <!-- Big/Small Stats -->
  <div class="row text-center mb-4">
    <div class="col-6">
      <div class="p-3 bg-dark rounded">
        <h4 id="big-stat" class="text-warning">0</h4>
        <small>BIG (5-9)</small>
      </div>
    </div>
    <div class="col-6">
      <div class="p-3 bg-dark rounded">
        <h4 id="small-stat" class="text-info">0</h4>
        <small>SMALL (0-4)</small>
      </div>
    </div>
  </div>

  <!-- History -->
  <h5 class="mb-3 text-light">Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let currentIssue = null;
let timerInterval = null;

async function fetchLiveData() {
  try {
    const res = await fetch(API_URL + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      const latest = data.data.list[0];

      if (!currentIssue || currentIssue.issueNumber !== latest.issueNumber) {
        currentIssue = latest;
        showLastResult(latest);
        startTimer();
      }

      showHistory(data.data.list);
      predictNext(data.data.list);
    }
  } catch (e) {
    console.error(e);
  }
}

function showLastResult(item) {
  document.getElementById("current-issue").textContent = item.issueNumber;
  document.getElementById("last-number").textContent = item.number;
  document.getElementById("last-number").className = `number-circle ${getColorClass(item.color)}`;
  document.getElementById("last-color").textContent = item.color.toUpperCase();
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  let timeLeft = 30;

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    const box = document.getElementById("timer-box");
    if (timeLeft <= 10) {
      box.classList.add("warning");
    } else {
      box.classList.remove("warning");
    }

    if (timeLeft <= 0) fetchLiveData();
  }, 1000);
}

function predictNext(list) {
  const recent = list.slice(0, 20);
  let bigCount = 0, smallCount = 0;

  recent.forEach(item => {
    const num = parseInt(item.number);
    if (num >= 5) bigCount++;
    else smallCount++;
  });

  const bigPercent = Math.round((bigCount / recent.length) * 100);

  let prediction = "";
  let bgClass = "success";

  if (bigPercent >= 62) {
    prediction = `🔥 BIG Expected<br><small>${bigPercent}% Chance</small>`;
    bgClass = "warning";
  } else if (bigPercent <= 38) {
    prediction = `🔥 SMALL Expected<br><small>${100 - bigPercent}% Chance</small>`;
  } else if (bigPercent > 50) {
    prediction = `Slightly BIG (${bigPercent}%)`;
  } else {
    prediction = `Slightly SMALL (${100 - bigPercent}%)`;
  }

  document.getElementById("prediction-box").innerHTML = prediction;
  document.getElementById("prediction-box").className = `prediction-box bg-${bgClass} text-center mb-4`;

  document.getElementById("big-stat").textContent = bigCount;
  document.getElementById("small-stat").textContent = smallCount;
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";

  list.slice(0, 10).forEach(item => {
    const num = parseInt(item.number);
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:50px;height:50px;font-size:22px;">
          ${item.number}
        </div>
        <small>${num >= 5 ? 'BIG' : 'SMALL'}</small>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Update
setInterval(fetchLiveData, 3000);
fetchLiveData();
</script>

</body>
</html>
