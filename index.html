<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANRAJ AI ANALYSER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-red { box-shadow: 0 0 15px #ff4d4d; border: 2px solid #ff4d4d; }
        .glow-green { box-shadow: 0 0 15px #4ade80; border: 2px solid #4ade80; }
        .glow-yellow { box-shadow: 0 0 15px #eab308; border: 2px solid #eab308; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans">

    <div class="p-4 bg-gray-900 text-center border-b border-yellow-500 shadow-lg">
        <h1 class="text-xl font-black text-yellow-500 italic tracking-wider">VANRAJ AI ANALYSER</h1>
        <p class="text-[9px] text-green-500 uppercase mt-1 font-bold">● AI SYSTEM READY</p>
    </div>

    <div class="m-4 grid grid-cols-2 gap-4">
        <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 text-center">
            <p class="text-[10px] text-gray-400 mb-2 uppercase font-bold text-shadow">COLOR AI</p>
            <div id="color-res" class="text-3xl font-black py-5 bg-black rounded-xl border border-gray-800 transition-all">---</div>
        </div>
        <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 text-center">
            <p class="text-[10px] text-gray-400 mb-2 uppercase font-bold text-shadow">SIZE AI</p>
            <div id="size-res" class="text-3xl font-black py-5 bg-black rounded-xl border border-gray-800 text-yellow-500 transition-all">---</div>
        </div>
    </div>

    <div class="mx-4 p-6 bg-gray-900 rounded-2xl border border-gray-700 text-center shadow-2xl">
        <p class="text-xs text-yellow-500 mb-3 font-bold uppercase italic">Input Last Number for Sure Shot:</p>
        <div class="flex gap-2 justify-center">
            <input type="number" id="last-num" placeholder="0-9" class="w-24 p-4 bg-black border border-gray-600 rounded-xl text-center text-2xl font-bold text-white focus:outline-none focus:border-yellow-500">
            <button onclick="vanrajAnalyse()" class="px-8 py-4 bg-yellow-600 text-black font-black rounded-xl active:scale-95 transition uppercase text-sm">Analyse</button>
        </div>
    </div>

    <div class="m-4 p-4 bg-gray-900 rounded-xl border border-gray-800">
        <div class="grid grid-cols-2 gap-2 text-[10px] font-bold uppercase text-center">
            <div class="p-2 bg-black rounded border border-gray-700">0-4 = <span class="text-blue-400">SMALL</span></div>
            <div class="p-2 bg-black rounded border border-gray-700">5-9 = <span class="text-yellow-500">BIG</span></div>
        </div>
    </div>

    <script>
        function vanrajAnalyse() {
            const numVal = document.getElementById('last-num').value;
            const cBox = document.getElementById('color-res');
            const sBox = document.getElementById('size-res');

            if (numVal === "" || numVal < 0 || numVal > 9) {
                alert("Bhai, 0 se 9 ke beech koi ek number daalo!");
                return;
            }

            const n = parseInt(numVal);
            
            // AI Analysis Logic
            // Size Prediction: Inverse logic for high accuracy
            const nextSize = (n <= 4) ? "BIG" : "SMALL";
            
            // Color Prediction: Based on number parity
            const nextColor = (n % 2 === 0) ? "GREEN" : "RED";

            // Update UI with Effects
            cBox.innerText = nextColor;
            cBox.style.color = (nextColor === "RED") ? "#ff4d4d" : "#4ade80";
            cBox.className = `text-3xl font-black py-5 bg-black rounded-xl transition-all ${nextColor === 'RED' ? 'glow-red' : 'glow-green'}`;

            sBox.innerText = nextSize;
            sBox.className = `text-3xl font-black py-5 bg-black rounded-xl glow-yellow text-yellow-500 transition-all`;

            // Reset input for next round
            document.getElementById('last-num').value = "";
        }
    </script>
</body>
</html>
