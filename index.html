<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Next Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }
    .next-box {
      background: linear-gradient(90deg, #00ff88, #00cc66);
      color: #000;
      font-size: 28px;
      font-weight: bold;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.7);
    }
    .timer {
      font-size: 42px;
      font-weight: bold;
      color: #ffd700;
    }
    .warning {
      background: #ff0000 !important;
      color: white !important;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      50% { opacity: 0.6; }
    }
    .main-result {
      background: rgba(0,0,0,0.8);
      border: 5px solid #ffd700;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }
    .number-circle {
      width: 150px; height: 150px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 70px; font-weight: bold;
      margin: 15px auto;
      box-shadow: 0 0 40px rgba(255,255,255,0.7);
    }
    .red { background: linear-gradient(45deg, #ff0000, #aa0000); }
    .green { background: linear-gradient(45deg, #00ff00, #008800); }
    .violet { background: linear-gradient(45deg, #8a2be2, #4b0082); }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning"><i class="fas fa-clock"></i> WinGo 30S - Next Result</h1>

  <!-- Next Period + Timer -->
  <div class="next-box" id="next-box">
    <div>Next Period : <span id="next-period">Loading...</span></div>
    <div class="timer mt-2" id="timer">30s</div>
  </div>

  <!-- Last Result -->
  <div class="main-result mb-4">
    <h5 class="text-warning mb-3">LAST RESULT</h5>
    <div id="big-number" class="number-circle red">00</div>
    <h3 id="color-name" class="text-uppercase">RED</h3>
    <h5 id="premium" class="text-warning">Premium : 0</h5>
  </div>

  <div class="text-center mb-4">
    <small id="status" class="text-success">Connected to Server</small>
  </div>

  <!-- History -->
  <h5 class="mb-3 text-light">Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let lastKnownIssue = null;
let timerInterval = null;

async function fetchData() {
  try {
    const res = await fetch(API_URL + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      const latest = data.data.list[0];

      if (!lastKnownIssue || lastKnownIssue.issueNumber !== latest.issueNumber) {
        lastKnownIssue = latest;
        showLastResult(latest);
        startNextTimer();
      }

      showHistory(data.data.list);
      document.getElementById("status").textContent = "✅ Live Connected";
    }
  } catch (e) {
    document.getElementById("status").innerHTML = "❌ Connection Error";
  }
}

function showLastResult(latest) {
  document.getElementById("big-number").textContent = latest.number;
  document.getElementById("big-number").className = `number-circle ${getColorClass(latest.color)}`;
  document.getElementById("color-name").textContent = latest.color.toUpperCase();
  document.getElementById("premium").innerHTML = `Premium : <strong>${latest.premium}</strong>`;
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function startNextTimer() {
  if (timerInterval) clearInterval(timerInterval);

  let timeLeft = 30;

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft + "s";

    const nextBox = document.getElementById("next-box");

    if (timeLeft <= 10) {
      nextBox.classList.add("warning");
    } else {
      nextBox.classList.remove("warning");
    }

    if (timeLeft <= 0) {
      fetchData();
    }
  }, 1000);
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";

  list.slice(1, 10).forEach(item => {
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:48px;height:48px;font-size:20px;">
          ${item.number}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Refresh + Initial Load
setInterval(fetchData, 3000);
fetchData();
</script>

</body>
</html>
