<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Next Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .next-main {
      background: linear-gradient(90deg, #00ff88, #00cc66);
      color: #000;
      padding: 25px;
      border-radius: 18px;
      text-align: center;
      margin-bottom: 25px;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.7);
    }
    .timer {
      font-size: 62px;
      font-weight: bold;
    }
    .warning {
      background: #ff3333 !important;
      color: white !important;
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 50% { opacity: 0.65; } }

    .last-result {
      background: rgba(255,255,255,0.1);
      border: 3px solid #ffd700;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }
    .number-circle {
      width: 110px; height: 110px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: bold;
      color: white;
      box-shadow: 0 0 30px rgba(255,255,255,0.6);
    }
    .red { background: linear-gradient(#ff0000, #cc0000); }
    .green { background: linear-gradient(#00ff00, #00aa00); }
    .violet { background: linear-gradient(#aa44ff, #6600cc); }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning">🔥 WinGo 30S - Next Result</h1>

  <!-- Next Result (Sabse Upar & Bada) -->
  <div class="next-main" id="next-main">
    <h5>Next Period</h5>
    <h2 id="next-period" class="mb-3">Loading...</h2>
    <div class="timer" id="timer">30</div>
    <small>seconds remaining</small>
  </div>

  <!-- Last Result -->
  <div class="last-result mb-4">
    <h5 class="text-warning mb-2">Last Result</h5>
    <div id="last-result" class="d-flex justify-content-center align-items-center gap-4"></div>
  </div>

  <div class="text-center mb-4">
    <small id="status" class="text-success">Connected to Server</small>
  </div>

  <!-- Recent History -->
  <h5 class="mb-3 text-light">Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
const HISTORY_API = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let lastIssue = null;

async function fetchResults() {
  try {
    const res = await fetch(HISTORY_API + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      const current = data.data.list[0];

      if (!lastIssue || lastIssue.issueNumber !== current.issueNumber) {
        lastIssue = current;
        showLastResult(current);
        startTimer();
      }
      showHistory(data.data.list);
      document.getElementById("status").innerHTML = "✅ Live Connected";
    }
  } catch (e) {
    document.getElementById("status").innerHTML = "❌ Connection Error";
  }
}

function showLastResult(item) {
  document.getElementById("last-result").innerHTML = `
    <div class="number-circle ${getColorClass(item.color)}">${item.number}</div>
    <div>
      <h5>${item.color.toUpperCase()}</h5>
      <small>Premium: ${item.premium}</small>
    </div>
  `;
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function startTimer() {
  if (window.timerInterval) clearInterval(window.timerInterval);

  let timeLeft = 30;
  const timerEl = document.getElementById("timer");
  const box = document.getElementById("next-main");

  window.timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;

    if (timeLeft <= 10) {
      box.classList.add("warning");
    } else {
      box.classList.remove("warning");
    }

    if (timeLeft <= 0) {
      fetchResults();
    }
  }, 1000);
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";
  list.slice(1, 12).forEach(item => {
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:55px;height:55px;font-size:24px;">
          ${item.number}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Refresh
setInterval(fetchResults, 3000);
fetchResults();
</script>

</body>
</html>
