<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WinGo Live</title>
    <style>
        body { background: #0f172a; color: white; padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="display">Fetching...</div>
    <script>
        async function fetchDirect() {
            // कोई Proxy नहीं, सीधे कॉल
            const url = 'fetch('https://api.frastonikelubra.com';
            try {
                const res = await fetch(url);
                const data = await res.json();
                document.getElementById('display').innerText = 'Latest Issue: ' + data.data.list[0].issueNumber;
            } catch (err) {
                document.getElementById('display').innerHTML = 
                    'Error: ' + err.message + 
                    '<br>सॉल्यूशन: Chrome में "Allow CORS: Access-Control-Allow-Origin" एक्सटेंशन इंस्टॉल करें!';
            }
        }
        fetchDirect();
    </script>
</body>
</html>
