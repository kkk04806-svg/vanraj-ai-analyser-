<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WinGo Real-Time Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        /* मुख्य रिजल्ट कार्ड */
        .result-card { background: #1e293b; padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #22c55e; margin-bottom: 20px; }
        .latest-period { font-size: 0.9em; color: #94a3b8; }
        .latest-value { font-size: 3em; font-weight: bold; margin: 10px 0; color: #fbbf24; }
        .timer-box { font-size: 1.5em; color: #ef4444; font-weight: bold; }
        /* टेबल स्टाइल */
        table { width: 100%; border-collapse: collapse; background: #1e293b; color: #fff; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: center; }
        th { background: #334155; }
        .green { color: #22c55e; font-weight: bold; }
        .red { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <!-- सबसे पहले रिजल्ट -->
        <div class="result-card">
            <div class="latest-period" id="period-text">Loading Period...</div>
            <div class="latest-value" id="result-text">--</div>
            <div class="timer-box">Next Draw: <span id="timer">30</span>s</div>
        </div>
        
        <!-- रियल-टाइम हिस्ट्री -->
        <table>
            <thead><tr><th>Period</th><th>No.</th><th>Color</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <script>
        let countdown = 30;
        
        async function fetchWinGoData() {
            try {
                const response = await fetch('https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json');
                const json = await response.json();
                const list = json.data.list;
                const latest = list[0];

                // 1. लेटेस्ट रिजल्ट को अपडेट करना
                document.getElementById('period-text').innerText = 'Period: ' + latest.issueNumber;
                document.getElementById('result-text').innerHTML = 
                    `<span class="${latest.color.split(',')[0]}">${latest.number} (${latest.color})</span>`;

                // 2. पूरी टेबल को अपडेट करना
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = list.map(item => `
                    <tr>
                        <td>${item.issueNumber.slice(-4)}</td>
                        <td>${item.number}</td>
                        <td class="${item.color.split(',')[0]}">${item.color}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Data Fetch Error:", err);
            }
        }

        // टाइमर लॉजिक
        setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                countdown = 30;
                fetchWinGoData();
            }
            document.getElementById('timer').innerText = countdown;
        }, 1000);

        // पेज लोड होते ही कॉल करें
        fetchWinGoData();
    </script>
</body>
</html>
