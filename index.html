<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live WinGo Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; color: #000; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; background: #fff; }
        th { background-color: #333; color: #fff; }
        .green { color: green; font-weight: bold; }
        .red { color: red; font-weight: bold; }
        #status { margin-top: 10px; color: #0f0; }
    </style>
</head>
<body>
    <h2>Live WinGo Data Stream</h2>
    <div id="status">Fetching data...</div>
    <table id="historyTable">
        <thead>
            <tr>
                <th>Issue Number</th>
                <th>Number</th>
                <th>Color</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        async function fetchData() {
            try {
                // API से डेटा फेच करने का कोड
                const url = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
                const response = await fetch(url);
                const result = await response.json();
                const list = result.data.list;
                
                const tbody = document.querySelector('#historyTable tbody');
                tbody.innerHTML = '';
                
                list.forEach(item => {
                    const row = `<tr>
                        <td>${item.issueNumber}</td>
                        <td>${item.number}</td>
                        <td class="${item.color.split(',')[0]}">${item.color}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
                document.getElementById('status').innerText = 'Last updated: ' + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('status').innerText = 'Error fetching data: ' + e.message;
            }
        }
        
        // 5 सेकंड में ऑटो-रिफ्रेश
        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
