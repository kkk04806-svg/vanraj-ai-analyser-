<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WinGo Live Monitor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #334155; }
        .last-result { font-size: 2em; font-weight: bold; margin: 10px 0; }
        .green { color: #22c55e; }
        .red { color: #ef4444; }
        table { border-collapse: collapse; width: 100%; background: #1e293b; color: #cbd5e1; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: center; }
        th { background-color: #334155; }
        #status { font-size: 0.9em; margin-top: 5px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Latest Trend</h2>
        <div id="latest-info" class="last-result">Loading...</div>
        <div id="status">Connecting...</div>
    </div>
    
    <table id="historyTable">
        <thead>
            <tr><th>Issue</th><th>Number</th><th>Color</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json');
                const data = await response.json();
                const list = data.data.list;
                const latest = list[0];
                
                // Latest result display
                const latestDiv = document.getElementById('latest-info');
                latestDiv.innerHTML = `Issue: ${latest.issueNumber} <br> <span class="${latest.color.split(',')[0]}">${latest.number} - ${latest.color}</span>`;
                
                // Update table
                const tbody = document.querySelector('#historyTable tbody');
                tbody.innerHTML = list.map(item => `
                    <tr>
                        <td>${item.issueNumber.slice(-4)}</td>
                        <td>${item.number}</td>
                        <td class="${item.color.split(',')[0]}">${item.color}</td>
                    </tr>
                `).join('');
                
                document.getElementById('status').innerText = 'Last updated: ' + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('status').innerText = 'Connection Error';
            }
        }
        setInterval(updateDashboard, 3000);
        updateDashboard();
    </script>
</body>
</html>
