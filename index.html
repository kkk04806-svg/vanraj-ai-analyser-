<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WinGo 30s – All Patterns Signal</title>
  <style>
    body {
      font-family: monospace;
      background: #000;
      color: #0f0;
      padding: 10px;
      font-size: 13px;
    }
    .log { margin: 5px 0; }
    .signal { color: #ff0; font-weight: bold; }
    .red { color: #f00; }
    .green { color: #0f0; }
    .violet { color: #f0f; }
    .small { color: #0ff; }
    .big { color: #ff0; }
    .info { color: #aaa; }
  </style>
</head>
<body>
  <h3>WinGo 30s – All Patterns Auto Signal</h3>
  <p>Auto‑refresh every <b>15s</b> | Patterns: Streak, Alternate, Mirror, 3–4 Repeat</p>

  <div id="signals" class="signal"></div>
  <pre id="raw"></pre>
  <div id="log"></div>

  <script>
    const API_URL =
      "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=";

    function log(text, cls = "") {
      const el = document.getElementById("log");
      const row = document.createElement("div");
      row.className = cls || "";
      row.textContent = `[${new Date().toISOString()}] ${text}`;
      el.prepend(row);
    }

    function parseColor(number, colorStr) {
      number = parseInt(number || "0");
      const c = colorStr || "";
      const bits = {
        red: c.includes("red"),
        green: c.includes("green"),
        violet: c.includes("violet"),
        big: number >= 5,
        small: number <= 4,
      };
      bits.color = bits.red ? "red" : bits.green ? "green" : bits.violet ? "violet" : "unknown";
      return bits;
    }

    function detectPatterns(recs) {
      // Only use last 20 for robustness
      const list = recs.slice(0, 20).map((r) => parseColor(r.number, r.color));
      if (list.length < 3) return { msg: "waiting..." };

      const last = list[0];
      const last2 = list[1];
      const last3 = list[2];
      const last4 = list[3];

      // --- 1) Streak (Dragon) ---
      let streak = 1;
      let streakType = last.color;
      for (let i = 1; i < list.length; i++) {
        if (list[i].color === streakType) streak++;
        else break;
      }

      // --- 2) Alternate (Red–Green–Red–Green) ---
      let altLen = 1;
      let isAlternate = true;
      for (let i = 1; i < list.length; i++) {
        if (list[i].color === list[i - 1].color) {
          isAlternate = false;
          break;
        } else if (list[i].color !== last.color) {
          altLen++;
        }
      }

      // --- 3) Mirror / Repetition (3–4 repeat) ---
      let repeats3 = 0;
      let repeats4 = 0;
      for (let i = 0; i + 2 < list.length; i++) {
        if (
          list[i].color === list[i + 2].color &&
          list[i].color === list[i + 1].color
        )
          repeats3++;
      }
      for (let i = 0; i + 3 < list.length; i++) {
        if (
          list[i].color === list[i + 1].color &&
          list[i].color === list[i + 2].color &&
          list[i].color === list[i + 3].color
        )
          repeats4++;
      }

      // --- 4) Small / Big Streak ---
      let bigStreak = 1,
        smallStreak = 1;
      for (let i = 1; i < list.length; i++) {
        if (list[i].big) bigStreak++;
        else {
          smallStreak++;
          break;
        }
      }

      // --- 5) Signal Logic (tune this for your market) ---
      let colorSignal = "WAIT";
      let bsSignal = "WAIT";

      // Streak continuation / reversal
      if (streak >= 4) {
        colorSignal = `TO FOLLOW: ${streakType}`; // Dragon pattern
      } else if (streak >= 3 && !isAlternate) {
        colorSignal = `TO REVERSE: ${last.color === "red" ? "green" : "red"}`;
      }

      if (isAlternate && altLen >= 6) {
        colorSignal = `Continue Alternate: opposite of ${last.color}`;
      }

      if (streak >= 4 && last.big) {
        bsSignal = "BIG";
      } else if (streak >= 4 && last.small) {
        bsSignal = "SMALL";
      }

      if (bigStreak >= 4) bsSignal = "CONTRARY SMALL";
      if (smallStreak >= 4) bsSignal = "CONTRARY BIG";

      return {
        color: last.color,
        number: last.big ? "BIG" : "SMALL",
        streak,
        alternate: isAlternate,
        altLen,
        repeats3,
        repeats4,
        bigStreak,
        smallStreak,
        colorSignal,
        bsSignal,
      };
    }

    async function fetchLatest() {
      const ts = Date.now();
      const url = API_URL + ts;

      try {
        document.getElementById("raw").textContent = "Loading...";
        const res = await fetch(url, {
          method: "GET",
          headers: { "Accept": "application/json" },
        });

        const data = await res.json();
        document.getElementById("raw").textContent = JSON.stringify(data, null, 2);

        if (data.code === 0 && data.data?.list?.length > 0) {
          const p = detectPatterns(data.data.list);

          const sig = document.getElementById("signals");
          sig.innerHTML = `
            <b>Detected: ${p.colorSignal} | ${p.bsSignal}</b><br>
            Current: ${p.color} (${p.number}) | Streak: ${p.streak} | Alt: ${p.alternate ? "YES" : "NO"}<br>
            Big Streak: ${p.bigStreak} | Small Streak: ${p.smallStreak}
          `;

          log(`Pattern: ${p.colorSignal} | ${p.bsSignal}`, "info");
        } else {
          log("API ERROR / EMPTY", "info");
        }
      } catch (err) {
        log("ERROR: " + err.message, "info");
      }
    }

    fetchLatest();
    setInterval(fetchLatest, 15 * 1000); // 15s auto‑refresh
  </script>
</body>
</html>
