<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WinGo Period Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .main-box { background: #1e293b; padding: 25px; border-radius: 15px; text-align: center; border: 2px solid #fbbf24; margin-bottom: 20px; }
        .period-text { font-size: 1.2em; color: #94a3b8; }
        .result-text { font-size: 2.5em; font-weight: bold; margin: 10px 0; }
        .timer { font-size: 2em; color: #fbbf24; }
        .green { color: #22c55e; }
        .red { color: #ef4444; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; color: #fff; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-box">
            <div id="period-info" class="period-text">Period: Loading...</div>
            <div id="result-info" class="result-text">--</div>
            <div id="timer" class="timer">--</div>
        </div>
        
        <table>
            <thead><tr><th>Period</th><th>No.</th><th>Color</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <script>
        let countdown = 30;
        
        async function updateData() {
            try {
                const response = await fetch('https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json');
                const data = await response.json();
                const list = data.data.list;
                const latest = list[0];
                
                document.getElementById('period-info').innerText = 'Period: ' + latest.issueNumber;
                document.getElementById('result-info').innerHTML = 
                    `<span class="${latest.color.split(',')[0]}">${latest.number}</span>`;
                
                document.getElementById('historyBody').innerHTML = list.map(item => `
                    <tr>
                        <td>${item.issueNumber.slice(-4)}</td>
                        <td>${item.number}</td>
                        <td class="${item.color.split(',')[0]}">${item.color}</td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                countdown = 30;
                updateData();
            }
            document.getElementById('timer').innerText = countdown + 's';
        }, 1000);

        updateData();
    </script>
</body>
</html>
