<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WinGo Analyst</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1220;color:#e5e7eb;margin:0;padding:16px}
    .card{background:#111827;border:1px solid #243244;border-radius:14px;padding:16px;max-width:1100px;margin:auto}
    h1,h2{margin:0 0 12px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:12px 0}
    .box{background:#0f172a;border:1px solid #243244;border-radius:12px;padding:12px}
    table{width:100%;border-collapse:collapse;margin-top:14px}
    th,td{border-bottom:1px solid #243244;padding:10px;text-align:left;font-size:14px}
    th{color:#93c5fd}
    .badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#1f2937}
    .green{color:#4ade80}
    .red{color:#f87171}
    .violet{color:#c084fc}
  </style>
</head>
<body>
  <div class="card">
    <h1>WinGo 1 Min Analyst</h1>

    <div class="grid">
      <div class="box"><div>Count Down</div><h2 id="cd">--:--</h2></div>
      <div class="box"><div>Period Id</div><h2 id="pid">20260512100010267</h2></div>
      <div class="box"><div>Next prediction</div><h2 id="pred">9</h2></div>
      <div class="box"><div>TOTAL BET AMOUNT</div><h2 id="amt">0</h2></div>
    </div>

    <h2>Result</h2>
    <table>
      <thead>
        <tr>
          <th>Result</th>
          <th>Number</th>
          <th>Bet</th>
          <th>No. of User</th>
          <th>Amount to Pay</th>
        </tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>

    <h2 style="margin-top:18px">Live Bets</h2>
    <table>
      <thead>
        <tr>
          <th>User ID</th>
          <th>Value</th>
          <th>Amount</th>
          <th>Mobile</th>
          <th>Balance</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="5">wait..</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const data = [
      {"issueNumber":"20260512100010267","number":"9","color":"green","premium":"9","sum":0},
      {"issueNumber":"20260512100010266","number":"0","color":"red,violet","premium":"0","sum":0},
      {"issueNumber":"20260512100010265","number":"1","color":"green","premium":"1","sum":0},
      {"issueNumber":"20260512100010264","number":"5","color":"green,violet","premium":"5","sum":0},
      {"issueNumber":"20260512100010263","number":"4","color":"red","premium":"4","sum":0}
    ];

    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = data.map((r, i) => `
      <tr>
        <td><span class="badge">${i === 0 ? 'Latest' : 'Past'}</span></td>
        <td>${r.number}</td>
        <td class="${r.color.replaceAll(',', ' ')}">${r.color}</td>
        <td>0</td>
        <td>${r.sum}</td>
      </tr>
    `).join('');
  </script>
</body>
</html>
