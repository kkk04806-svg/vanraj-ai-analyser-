<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WinGo Live Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .main-card { background: #1e293b; padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #38bdf8; margin-bottom: 20px; }
        .period-label { font-size: 0.9em; color: #94a3b8; text-transform: uppercase; }
        .period-value { font-size: 1.8em; font-weight: bold; color: #fbbf24; margin-bottom: 10px; }
        .result-value { font-size: 3em; font-weight: bold; }
        .green { color: #22c55e; }
        .red { color: #ef4444; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; color: #fff; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: center; }
        th { background: #334155; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="period-label">Latest Period</div>
            <div id="latest-period" class="period-value">Loading...</div>
            <div id="latest-result" class="result-value">--</div>
        </div>
        
        <table>
            <thead><tr><th>Period</th><th>No.</th><th>Color</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <script>
        async function updateData() {
            try {
                const response = await fetch('https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json');
                const data = await response.json();
                const list = data.data.list;
                const latest = list[0];
                
                document.getElementById('latest-period').innerText = latest.issueNumber;
                document.getElementById('latest-result').innerHTML = 
                    `<span class="${latest.color.split(',')[0]}">${latest.number} (${latest.color})</span>`;
                
                document.getElementById('historyBody').innerHTML = list.map(item => `
                    <tr>
                        <td>${item.issueNumber.slice(-4)}</td>
                        <td>${item.number}</td>
                        <td class="${item.color.split(',')[0]}">${item.color}</td>
                    </tr>
                `).join('');
            } catch (e) { console.error("Error:", e); }
        }

        setInterval(updateData, 3000);
        updateData();
    </script>
</body>
</html>
