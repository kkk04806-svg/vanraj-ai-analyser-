<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANRAJ AI ANALYSER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="p-4 bg-gray-900 text-center border-b border-yellow-500">
        <h1 class="text-xl font-bold text-yellow-500 uppercase tracking-tighter">VANRAJ AI ANALYSER</h1>
    </div>

    <div class="m-4 p-6 bg-gray-900 rounded-2xl border border-gray-800 text-center">
        <p id="status-text" class="text-gray-500 text-xs mb-2">CONNECTING TO SERVER...</p>
        <div id="prediction-box" class="text-3xl font-black py-4 rounded-xl bg-gray-800 shadow-inner">
            WAITING...
        </div>
        <button onclick="fetchGameData()" class="mt-4 px-6 py-2 bg-yellow-600 text-sm font-bold rounded-full active:scale-95 transition">
            REFRESH NOW
        </button>
    </div>

    <div class="mx-4 mb-20">
        <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
            <table class="w-full text-left text-xs">
                <thead class="bg-gray-800 text-gray-400">
                    <tr><th class="p-3">PERIOD</th><th class="p-3 text-center">NUM</th><th class="p-3 text-right">SIZE</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchGameData() {
            const status = document.getElementById('status-text');
            status.innerText = "FETCHING NEW DATA...";
            try {
                const response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://draw.ar-lottery01.com/WinGo/WinGo_30S.json?ts=" + Date.now()));
                const json = await response.json();
                const list = JSON.parse(json.contents).data.list;
                
                // Simple Logic: Color trend analysis
                const nextColor = list[0].color === list[1].color ? (list[0].color.includes('red') ? "GREEN" : "RED") : (list[0].color.includes('red') ? "RED" : "GREEN");
                
                const pBox = document.getElementById('prediction-box');
                pBox.innerText = nextColor;
                pBox.style.color = nextColor === 'RED' ? '#ff4d4d' : '#4ade80';
                status.innerText = "● LIVE DATA SYNCED";

                document.getElementById('history-body').innerHTML = list.slice(0, 10).map(g => `
                    <tr class="border-b border-gray-800">
                        <td class="p-3 font-mono text-gray-300">${g.issueNumber.slice(-4)}</td>
                        <td class="p-3 text-center font-bold" style="color:${g.color.includes('red') ? '#ff4d4d' : '#4ade80'}">${g.number}</td>
                        <td class="p-3 text-right text-gray-500">${parseInt(g.number) <= 4 ? "SMALL" : "BIG"}</td>
                    </tr>`).join('');
            } catch (e) { 
                status.innerText = "CONNECTION ERROR! RETRYING...";
                console.error(e); 
            }
        }
        setInterval(fetchGameData, 10000); 
        fetchGameData();
    </script>
</body>
</html>
