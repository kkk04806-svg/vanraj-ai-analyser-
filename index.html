<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel</title>
    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
        }
        .card {
            background: #1e2937;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #f0b90b;
            text-align: center;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            margin: 15px 0;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #22c55e;
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }
        .logs {
            margin-top: 25px;
            background: #000;
            color: #4ade80;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            height: 160px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🔧 ADMIN CONTROL PANEL</h1>
        <h3 style="text-align:center; color:#94a3b8;">Change Admin Password</h3>
        
        <input type="text" id="newPass" placeholder="Enter New Password" />
        <button onclick="updatePassword()">UPDATE PASSWORD</button>

        <div class="logs" id="logs">
            [SYSTEM] Admin Panel Ready<br>
            No Login Required
        </div>
    </div>
</div>

<script>
function log(message) {
    const logs = document.getElementById('logs');
    const time = new Date().toLocaleTimeString();
    logs.innerHTML += `<br>[${time}] ${message}`;
    logs.scrollTop = logs.scrollHeight;
}

async function updatePassword() {
    const newPass = document.getElementById('newPass').value.trim();
    
    if (newPass === "") {
        alert("Password enter karo bhai!");
        return;
    }

    log("Updating password...");

    try {
        const formData = new FormData();
        formData.append('newupi', newPass);

        const response = await fetch('adminpass.php', {
            method: 'POST',
            body: formData
        });

        log("✅ Password Updated Successfully!");
        alert("Password Successfully Updated!");

    } catch (error) {
        log("❌ Update Failed");
        console.error(error);
    }
}
</script>

</body>
</html>
