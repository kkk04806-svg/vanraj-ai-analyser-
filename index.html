<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANRAJ AI PATTERN PILOT</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #151d30; padding: 25px; border-radius: 15px; box-shadow: 0 0 25px rgba(0, 255, 123, 0.2); border: 1px solid #1f2c47; }
        h1 { color: #00ff7b; letter-spacing: 2px; font-size: 24px; margin-bottom: 5px; }
        p.subtitle { color: #8a99ad; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        .data-box { background: #1f2c47; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #00ff7b; text-align: left; }
        .data-title { font-size: 12px; color: #8a99ad; text-transform: uppercase; }
        .data-value { font-size: 20px; font-weight: bold; margin-top: 5px; }
        .prediction-card { background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); padding: 20px; border-radius: 12px; border: 2px dashed #00ff7b; margin-top: 25px; }
        .predict-title { font-size: 16px; font-weight: bold; color: #8a99ad; }
        .predict-value { font-size: 32px; font-weight: 900; margin-top: 10px; text-shadow: 0 0 10px rgba(0,255,123,0.5); }
        .loader { color: #8a99ad; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>VANRAJ AI ANALYSER</h1>
        <p class="subtitle">PatternPilot Real-time Tracker</p>

        <div class="data-box">
            <div class="data-title">Last Period Number</div>
            <div class="data-value" id="last-period">Loading...</div>
        </div>

        <div class="data-box" style="border-left-color: #ff3b30;">
            <div class="data-title">Last Result (Number & Size)</div>
            <div class="data-value" id="last-result">Loading...</div>
        </div>

        <div class="prediction-card">
            <div class="predict-title">NEXT PERIOD PREDICTION</div>
            <div class="data-value" id="next-period" style="color: #00ff7b; font-size: 16px;">--</div>
            <div class="predict-value" id="prediction">WAITING...</div>
        </div>
    </div>

    <script>
        // TODO: Apne Firebase Console se Config Details yahan paste karein
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Live Real-time Database Listener
        database.ref('game_updates').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('last-period').innerText = data.last_period;
                document.getElementById('last-result').innerText = data.last_number + " (" + data.last_size + ")";
                document.getElementById('next-period').innerText = "Period: " + data.next_period;
                
                // Set Prediction Text and Style
                const predElement = document.getElementById('prediction');
                predElement.innerText = data.prediction;
                if(data.prediction.includes("BIG")) {
                    predElement.style.color = "#00ff7b";
                } else {
                    predElement.style.color = "#ff3b30";
                }
            }
        });
    </script>
</body>
</html>
