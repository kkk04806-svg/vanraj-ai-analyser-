<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WinGo 1 Min Live Analyst</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1220;color:#e5e7eb;margin:0;padding:16px}
    .card{background:#111827;border:1px solid #243244;border-radius:14px;padding:16px;max-width:1200px;margin:auto}
    h1,h2{margin:0 0 12px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:12px 0}
    .box{background:#0f172a;border:1px solid #243244;border-radius:12px;padding:12px}
    table{width:100%;border-collapse:collapse;margin-top:14px}
    th,td{border-bottom:1px solid #243244;padding:10px;text-align:left;font-size:14px}
    th{color:#93c5fd}
    .badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#1f2937}
    .green{color:#4ade80}
    .red{color:#f87171}
    .violet{color:#c084fc}
    .match{background:#163024}
    .muted{color:#94a3b8}
    .row-top{background:#0f1d33}
  </style>
</head>
<body>
  <div class="card">
    <h1>WinGo 1 Min</h1>

    <div class="grid">
      <div class="box"><div>Count Down</div><h2 id="countdown">--:--</h2></div>
      <div class="box"><div>Period Id</div><h2 id="periodId">Loading...</h2></div>
      <div class="box"><div>Next prediction</div><h2 id="nextPrediction">--</h2></div>
      <div class="box"><div>TOTAL BET AMOUNT</div><h2 id="totalBet">0</h2></div>
    </div>

    <h2>Result</h2>
    <table>
      <thead>
        <tr>
          <th>Result</th>
          <th>Issue Number</th>
          <th>Number</th>
          <th>Color</th>
          <th>Premium</th>
          <th>Sum</th>
        </tr>
      </thead>
      <tbody id="resultBody">
        <tr><td colspan="6" class="muted">Loading...</td></tr>
      </tbody>
    </table>

    <h2 style="margin-top:18px">Live Bets</h2>
    <table>
      <thead>
        <tr>
          <th>User ID</th>
          <th>Value</th>
          <th>Amount</th>
          <th>Mobile</th>
          <th>Balance</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="5" class="muted">wait..</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const apiUrl = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=" + Date.now();

    function colorClass(color){
      return color.split(",").map(s => s.trim()).join(" ");
    }

    function render(data){
      const list = (data && data.data && data.data.list) ? data.data.list : [];
      if (!list.length) return;

      const latest = list[0];
      document.getElementById("periodId").textContent = latest.issueNumber || "N/A";
      document.getElementById("nextPrediction").textContent = latest.number || "--";
      document.getElementById("resultBody").innerHTML = list.map((r, i) => {
        const isTop = i === 0;
        const isMatch = String(r.issueNumber) === String(latest.issueNumber);
        return `
          <tr class="${isTop ? 'row-top' : ''} ${isMatch ? 'match' : ''}">
            <td><span class="badge">${isTop ? 'Latest' : 'Past'}</span></td>
            <td>${r.issueNumber || ""}</td>
            <td>${r.number || ""}</td>
            <td class="${colorClass(r.color || '')}">${r.color || ""}</td>
            <td>${r.premium || ""}</td>
            <td>${r.sum ?? ""}</td>
          </tr>
        `;
      }).join("");
    }

    fetch(apiUrl, {cache: "no-store"})
      .then(r => r.json())
      .then(render)
      .catch(() => {
        document.getElementById("resultBody").innerHTML =
          '<tr><td colspan="6" class="muted">API load failed</td></tr>';
      });
  </script>
</body>
</html>
