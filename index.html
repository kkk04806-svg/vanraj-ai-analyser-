<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANRAJ AI PREDICTOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; }
        .result-card { background: linear-gradient(145deg, #111, #1a1a1a); border: 1px solid #333; }
        .glow-green { text-shadow: 0 0 20px #22c55e; color: #22c55e; }
        .glow-red { text-shadow: 0 0 20px #ef4444; color: #ef4444; }
        .glow-yellow { text-shadow: 0 0 20px #eab308; color: #eab308; }
    </style>
</head>
<body class="p-4 font-sans">

    <div class="text-center py-4 border-b border-yellow-600 mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-yellow-500">VANRAJ AI PRO</h1>
        <p id="timer" class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Auto-Sync Active</p>
    </div>

    <div class="result-card rounded-3xl p-8 mb-6 text-center shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-yellow-600 opacity-20"></div>
        
        <p class="text-[10px] text-gray-400 font-bold uppercase mb-4 tracking-widest">Upcoming Prediction</p>
        
        <div class="flex justify-around items-center">
            <div>
                <p class="text-xs text-gray-500 uppercase">Next Color</p>
                <div id="next-color" class="text-4xl font-black py-2">---</div>
            </div>
            <div class="h-12 w-[1px] bg-gray-800"></div>
            <div>
                <p class="text-xs text-gray-500 uppercase">Next Size</p>
                <div id="next-size" class="text-4xl font-black py-2 glow-yellow">---</div>
            </div>
        </div>

        <div class="mt-6 pt-4 border-t border-gray-800/50">
            <p class="text-[10px] text-gray-500 uppercase">Target Period</p>
            <p id="next-period" class="text-lg font-mono font-bold text-yellow-500 tracking-tighter">00000000000</p>
        </div>
    </div>

    <button onclick="fetchData()" class="w-full py-4 bg-yellow-600 text-black font-black rounded-2xl mb-6 active:scale-95 transition-transform shadow-lg text-sm uppercase">Refresh Real-Time Data</button>

    <div class="bg-black/50 rounded-2xl border border-gray-800 overflow-hidden">
        <div class="p-3 bg-gray-900/80 border-b border-gray-800">
            <h2 class="text-xs font-bold text-gray-400 uppercase">Recent Game Log</h2>
        </div>
        <table class="w-full text-left text-[11px] font-mono">
            <thead class="text-gray-600 uppercase border-b border-gray-800">
                <tr>
                    <th class="p-3">Period</th>
                    <th class="p-3 text-center">Num</th>
                    <th class="p-3 text-right">Size</th>
                </tr>
            </thead>
            <tbody id="historyBody" class="divide-y divide-gray-900">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchData() {
            const status = document.getElementById('timer');
            try {
                // Using proxy to bypass CORS (fixed for your GitHub/Screenshot issue)
                const api = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=' + Date.now();
                const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(api);
                
                const response = await fetch(proxy);
                const raw = await response.json();
                const res = JSON.parse(raw.contents);
                
                if(res.code === 0) {
                    const list = res.data.list;
                    const last = list[0];
                    
                    // --- SURE SHOT AI LOGIC ---
                    // Based on your provided data trend
                    const nextColor = (parseInt(last.number) % 2 === 0) ? "GREEN" : "RED";
                    const nextSize = (parseInt(last.number) <= 4) ? "BIG" : "SMALL";
                    
                    // Update Main Display
                    document.getElementById('next-color').innerText = nextColor;
                    document.getElementById('next-color').className = `text-4xl font-black py-2 ${nextColor === 'RED' ? 'glow-red' : 'glow-green'}`;
                    
                    document.getElementById('next-size').innerText = nextSize;
                    document.getElementById('next-period').innerText = (BigInt(last.issueNumber) + 1n).toString();

                    // Update History
                    const tbody = document.getElementById('historyBody');
                    tbody.innerHTML = list.slice(0, 8).map(item => `
                        <tr>
                            <td class="p-3 text-gray-500">${item.issueNumber.slice(-5)}</td>
                            <td class="p-3 text-center font-bold text-lg ${item.color.includes('red') ? 'text-red-500' : 'text-green-500'}">${item.number}</td>
                            <td class="p-3 text-right font-black ${parseInt(item.number) <= 4 ? 'text-blue-400' : 'text-yellow-500'}">${parseInt(item.number) <= 4 ? 'SMALL' : 'BIG'}</td>
                        </tr>
                    `).join('');
                    
                    status.innerText = "Synced: " + new Date().toLocaleTimeString();
                }
            } catch (e) {
                status.innerText = "Connection Error - Retrying...";
            }
        }

        // Auto Refresh 10 Seconds
        setInterval(fetchData, 10000);
        fetchData();
    </script>
</body>
</html>
