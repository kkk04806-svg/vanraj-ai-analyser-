<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Fixed Panel</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 15px; }
        .card { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
        .error { color: #f87171; font-size: 0.8em; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; color: #fff; }
        th, td { padding: 8px; border: 1px solid #334155; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <div id="status">Connecting...</div>
        <div id="period" style="font-size: 1.5em;">--</div>
    </div>
    
    <table id="historyTable">
        <thead><tr><th>Period</th><th>No.</th><th>Color</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        async function loadData() {
            const status = document.getElementById('status');
            // यहाँ अपनी API डालें
            const url = 'https://api.frastonikelubra.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Status ' + response.status);
                
                const data = await response.json();
                const item = data.data.list[0];
                
                document.getElementById('period').innerText = 'Period: ' + item.issueNumber;
                document.getElementById('status').innerText = 'Online';
                
                const tbody = document.getElementById('tbody');
                tbody.innerHTML = data.data.list.map(i => `
                    <tr><td>${i.issueNumber.slice(-4)}</td><td>${i.number}</td><td>${i.color}</td></tr>
                `).join('');
                
            } catch (err) {
                // यह हिस्सा बताएगा कि क्या समस्या है
                status.innerHTML = '<span class="error">Error: ' + err.message + '. Check Console (F12).</span>';
            }
        }
        
        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
