<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinGo 30S - Timer + Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    .timer-box {
      background: #ff0000;
      color: white;
      font-size: 32px;
      font-weight: bold;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 20px;
    }
    .main-result {
      background: rgba(0,0,0,0.85);
      border: 6px solid #ffd700;
      border-radius: 25px;
      padding: 30px 20px;
      text-align: center;
    }
    .number-circle {
      width: 160px; height: 160px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 75px; font-weight: bold;
      color: white; margin: 20px auto;
      box-shadow: 0 0 50px rgba(255,255,255,0.8);
    }
    .red { background: linear-gradient(45deg, #ff0000, #aa0000); }
    .green { background: linear-gradient(45deg, #00ff00, #008800); }
    .violet { background: linear-gradient(45deg, #8a2be2, #4b0082); }
  </style>
</head>
<body>

<div class="container py-4">

  <h1 class="text-center mb-4 text-warning">WinGo 30S - Live Timer</h1>

  <!-- Timer -->
  <div class="timer-box" id="timer-box">
    Next Result in: <span id="countdown">30</span>s
  </div>

  <!-- Latest Result -->
  <div class="main-result mb-4" id="main-result">
    <h5 class="text-warning">LATEST RESULT</h5>
    <div id="big-number" class="number-circle red">00</div>
    <h2 id="color-name" class="text-uppercase">RED</h2>
    <h5 id="premium">Premium : 0</h5>
  </div>

  <div class="text-center mb-3">
    <small id="period-info" class="text-success"></small>
  </div>

  <!-- History -->
  <h5 class="mb-3 text-light">Recent Results</h5>
  <div id="history" class="row row-cols-2 row-cols-md-5 g-3"></div>

</div>

<script>
const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";

let lastIssue = null;
let countdownInterval = null;

async function fetchResults() {
  try {
    const res = await fetch(API_URL + "?ts=" + Date.now());
    const data = await res.json();

    if (data.code === 0 && data.data?.list?.length > 0) {
      const current = data.data.list[0];
      
      // Agar naya result aaya hai to update karo
      if (!lastIssue || lastIssue.issueNumber !== current.issueNumber) {
        lastIssue = current;
        showLatestResult(current);
        startCountdown();
      }
      
      showHistory(data.data.list);
    }
  } catch (e) {
    console.error(e);
  }
}

function showLatestResult(latest) {
  document.getElementById("big-number").textContent = latest.number;
  document.getElementById("big-number").className = `number-circle ${getColorClass(latest.color)}`;
  document.getElementById("color-name").textContent = latest.color.toUpperCase();
  document.getElementById("premium").innerHTML = `Premium : <strong>${latest.premium}</strong>`;
  document.getElementById("period-info").textContent = `Period: ${latest.issueNumber}`;
}

function getColorClass(color) {
  if (color.includes("red")) return "red";
  if (color.includes("green")) return "green";
  if (color.includes("violet")) return "violet";
  return "red";
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);

  let timeLeft = 30;   // WinGo 30S

  countdownInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("countdown").textContent = timeLeft;

    // 10 second pahle highlight
    if (timeLeft <= 10) {
      document.getElementById("timer-box").style.background = "#ffd700";
      document.getElementById("timer-box").style.color = "#000";
    } else {
      document.getElementById("timer-box").style.background = "#ff0000";
      document.getElementById("timer-box").style.color = "#fff";
    }

    if (timeLeft <= 0) {
      document.getElementById("countdown").textContent = "00";
      fetchResults();   // Naya result fetch karo
    }
  }, 1000);
}

function showHistory(list) {
  const container = document.getElementById("history");
  container.innerHTML = "";

  list.slice(1, 11).forEach(item => {
    const div = document.createElement("div");
    div.className = "col";
    div.innerHTML = `
      <div class="text-center p-2 bg-dark rounded">
        <small>${item.issueNumber.slice(-6)}</small><br>
        <div class="number-circle ${getColorClass(item.color)} mx-auto" style="width:50px;height:50px;font-size:22px;">
          ${item.number}
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Auto Fetch + Timer
setInterval(fetchResults, 3000);
fetchResults();   // First Load
</script>

</body>
</html>
