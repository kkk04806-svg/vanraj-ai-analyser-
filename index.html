<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connection Debugger</title>
    <style>
        body { font-family: monospace; background: #0f172a; color: #fff; padding: 20px; }
        .log-box { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #38bdf8; }
    </style>
</head>
<body>
    <h3>API Connection Debugger</h3>
    <div id="log" class="log-box">Connecting...</div>

    <script>
        const log = (msg) => document.getElementById('log').innerHTML += '<br>> ' + msg;
        
        async function checkConnection() {
            // अपनी सही API यहाँ डालें
            const API_URL = 'https://api.frastonikelubra.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
            
            try {
                const response = await fetch(API_URL);
                log('Status: ' + response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    log('Success! Data received.');
                    console.log(data);
                } else {
                    log('Error: Server returned status ' + response.status);
                }
            } catch (e) {
                log('CONNECTION ERROR: ' + e.message);
                log('सराहना: ब्राउज़र कंसोल (F12) देखें, शायद CORS Error है।');
            }
        }
        checkConnection();
    </script>
</body>
</html>
