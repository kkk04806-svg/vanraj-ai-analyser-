<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<title>WinGo Clotting Analyzer</title>
<style>
body{font-family:Arial,sans-serif;background:#0b1220;color:#e5e7eb;margin:0;padding:16px}
.card{max-width:1100px;margin:auto;background:#111827;border:1px solid #243244;border-radius:14px;padding:16px}
h1,h2{margin:0 0 12px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:12px 0}
.box{background:#0f172a;border:1px solid #243244;border-radius:12px;padding:12px}
table{width:100%;border-collapse:collapse;margin-top:14px}
th,td{border-bottom:1px solid #243244;padding:10px;text-align:left;font-size:14px}
th{color:#93c5fd}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#1f2937}
.green{color:#4ade80}.red{color:#f87171}.violet{color:#c084fc}
.big{color:#60a5fa;font-weight:700}
.small{color:#fbbf24;font-weight:700}
.row-top{background:#0f1d33}
.match{outline:1px solid #22c55e}
.muted{color:#94a3b8}
.good{color:#22c55e;font-weight:700}
.warn{color:#f59e0b;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <h1>WinGo Live Analyzer</h1>

  <div class="grid">
    <div class="box"><div>Count Down</div><h2 id="countdown">--:--</h2></div>
    <div class="box"><div>Period Id</div><h2 id="periodId">Loading...</h2></div>
    <div class="box"><div>Latest Number</div><h2 id="latestNumber">--</h2></div>
    <div class="box"><div>Big / Small</div><h2 id="bs">--</h2></div>
  </div>

  <div class="grid">
    <div class="box"><div>Recent Big</div><h2 id="bigCount">0</h2></div>
    <div class="box"><div>Recent Small</div><h2 id="smallCount">0</h2></div>
    <div class="box"><div>Trend</div><h2 id="trend">--</h2></div>
    <div class="box"><div>Live Status</div><h2 id="status">Connected</h2></div>
  </div>

  <h2>Result</h2>
  <table>
    <thead>
      <tr>
        <th>Type</th>
        <th>Issue Number</th>
        <th>Number</th>
        <th>Big/Small</th>
        <th>Color</th>
        <th>Premium</th>
      </tr>
    </thead>
    <tbody id="resultBody">
      <tr><td colspan="6" class="muted">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
const api1 = 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=' + Date.now();
const api30 = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=' + Date.now();

function bigSmall(n){ return n >= 5 ? 'Big' : 'Small'; }

function analyze(list){
  const recent = list.slice(0,10).map(x => bigSmall(Number(x.number)));
  const big = recent.filter(x => x === 'Big').length;
  const small = recent.filter(x => x === 'Small').length;
  let trend = 'Balanced';
  if (big > small) trend = 'Big trend';
  else if (small > big) trend = 'Small trend';
  return {big, small, trend};
}

function render(list){
  if(!list || !list.length){
    document.getElementById('status').textContent = 'No Data';
    document.getElementById('resultBody').innerHTML = '<tr><td colspan="6" class="muted">No data</td></tr>';
    return;
  }

  const latest = list[0];
  const latestNum = Number(latest.number);
  const res = analyze(list);

  document.getElementById('periodId').textContent = latest.issueNumber || 'N/A';
  document.getElementById('latestNumber').textContent = latest.number ?? '--';
  document.getElementById('bs').textContent = bigSmall(latestNum);
  document.getElementById('bigCount').textContent = res.big;
  document.getElementById('smallCount').textContent = res.small;
  document.getElementById('trend').textContent = res.trend;
  document.getElementById('status').textContent = 'Live';

  document.getElementById('resultBody').innerHTML = list.slice(0,10).map((r, i) => {
    const n = Number(r.number);
    const bs = bigSmall(n);
    const cls = (r.color || '').replaceAll(',', ' ');
    return `
      <tr class="${i===0 ? 'row-top match' : ''}">
        <td><span class="badge">${i===0 ? 'Latest' : 'Past'}</span></td>
        <td>${r.issueNumber || ''}</td>
        <td>${r.number || ''}</td>
        <td class="${bs.toLowerCase()}">${bs}</td>
        <td class="${cls}">${r.color || ''}</td>
        <td>${r.premium || ''}</td>
      </tr>
    `;
  }).join('');
}

function load(){
  fetch(api1, {cache:'no-store'})
    .then(r => r.json())
    .then(j => render(j?.data?.list))
    .catch(() => {
      fetch(api30, {cache:'no-store'})
        .then(r => r.json())
        .then(j => render(j?.data?.list))
        .catch(() => {
          document.getElementById('status').textContent = 'API Error';
          render([]);
        });
    });
}

function tick(){
  const now = new Date();
  const end = new Date();
  end.setSeconds(59,0);
  let diff = Math.max(0, Math.floor((end-now)/1000));
  const m = String(Math.floor(diff/60)).padStart(2,'0');
  const s = String(diff%60).padStart(2,'0');
  document.getElementById('countdown').textContent = `${m}:${s}`;
}
tick();
load();
setInterval(tick, 1000);
setInterval(load, 5000);
</script>
</body>
</html>
